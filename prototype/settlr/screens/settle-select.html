<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Settlr — Settle Up</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../tokens/index.css">
  <link rel="stylesheet" href="../css/index.css">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-body);
      background: var(--surface-primary);
      color: var(--text-primary);
      max-width: 393px;
      margin: 0 auto;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Status Bar ── */
    .status-bar {
      height: 44px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 var(--spacing-16);
    }
    .status-bar__time {
      font-family: var(--font-body);
      font-size: var(--font-size-14);
      font-weight: var(--weight-semibold);
      line-height: var(--line-height-20);
      letter-spacing: -0.5px;
      color: var(--text-primary);
    }
    .status-bar__icons {
      display: flex;
      align-items: center;
      gap: var(--spacing-4);
      color: var(--text-primary);
    }

  </style>
</head>
<body>

  <!-- ── Status Bar ── -->
  <div class="status-bar">
    <span class="status-bar__time">9:41</span>
    <div class="status-bar__icons">
      <svg width="17" height="12" viewBox="0 0 17 12" fill="none"><rect x="0" y="4" width="3" height="8" rx="1" fill="currentColor"/><rect x="4.5" y="2.5" width="3" height="9.5" rx="1" fill="currentColor"/><rect x="9" y="1" width="3" height="11" rx="1" fill="currentColor"/><rect x="13.5" y="0" width="3" height="12" rx="1" fill="currentColor" opacity="0.35"/></svg>
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M8 9.5a1.25 1.25 0 1 0 0 2.5 1.25 1.25 0 0 0 0-2.5z" fill="currentColor"/><path d="M3.5 6.2C4.9 4.8 6.9 4 9 4s4.1.8 5.5 2.2l-1.5 1.5C11.9 6.6 10.5 6 9 6S6.1 6.6 5 7.7L3.5 6.2z" fill="currentColor"/><path d="M.5 3.2C2.4 1.2 5.6 0 9 0s6.6 1.2 8.5 3.2L16 4.7C14.5 3 11.9 2 9 2S3.5 3 2 4.7L.5 3.2z" fill="currentColor"/></svg>
      <svg width="25" height="12" viewBox="0 0 25 12" fill="none"><rect x="0.5" y="0.5" width="21" height="11" rx="3.5" stroke="currentColor" stroke-opacity="0.35"/><rect x="2" y="2" width="18" height="8" rx="2" fill="currentColor"/><path d="M23 4v4a2 2 0 0 0 0-4z" fill="currentColor" fill-opacity="0.4"/></svg>
    </div>
  </div>

  <!-- ── Top Bar ── -->
  <header class="top-app-bar top-app-bar--nav">
    <a href="home-dashboard" class="top-app-bar__back" aria-label="Back">
      <i class="ph-bold ph-caret-left"></i>
    </a>
    <span class="top-app-bar__title">Settle Up</span>
  </header>

  <!-- ── Step Progress (Step 1 of 3) ── -->
  <div class="step-progress">
    <div class="step-progress__step step-progress__step--active"></div>
    <div class="step-progress__step"></div>
    <div class="step-progress__step"></div>
  </div>

  <!-- ── Search ── -->
  <div class="search-wrap">
    <div class="search-input">
      <span class="search-input__icon">
        <i class="ph ph-magnifying-glass"></i>
      </span>
      <input type="text" placeholder="Search people">
    </div>
  </div>

  <!-- ── Lists rendered by JS ── -->
  <div id="js-groups-label" class="section-label" hidden>Groups</div>
  <div id="js-groups-list"></div>
  <div id="js-people-label" class="section-label" hidden>People</div>
  <div id="js-people-list"></div>

  <script src="../js/store.js"></script>
  <script>
    (function () {

      function groupRow(group, bal) {
        var dir = bal.direction;
        var mod = dir === 'owe' ? ' person-item--owe' : ' person-item--lent';
        var label = dir === 'owe' ? 'You owe' : 'You lent';
        var right = '<div class="expense-item__right">' +
          '<span class="expense-item__label expense-item__label--' + dir + '">' + label + '</span>' +
          '<span class="expense-item__amount expense-item__amount--' + dir + '">' + Store.formatINR(bal.amount) + '</span>' +
        '</div>';
        return '<a class="person-item' + mod + '" href="group-detail?id=' + group.id + '">' +
          '<div class="person-item__group-icon">' + (group.emoji || '👥') + '</div>' +
          '<div class="person-item__text">' +
            '<span class="person-item__name">' + group.name + '</span>' +
            '<span class="person-item__subtext">' + group.memberCount + ' members</span>' +
          '</div>' +
          right +
        '</a>';
      }

      function personRow(contact, bal) {
        var dir = bal.direction;
        var mod = dir === 'owe' ? ' person-item--owe' : ' person-item--lent';
        var label = dir === 'owe' ? 'You owe' : 'You lent';
        var commonGroups = Store.getCommonGroups(contact.id);
        var subtext = commonGroups.length ? commonGroups.map(function(g){ return g.name; }).join(', ') : 'Individual';
        var right = '<div class="expense-item__right">' +
          '<span class="expense-item__label expense-item__label--' + dir + '">' + label + '</span>' +
          '<span class="expense-item__amount expense-item__amount--' + dir + '">' + Store.formatINR(bal.amount) + '</span>' +
        '</div>';
        return '<a class="person-item' + mod + '" href="settle-amount?contactId=' + contact.id + '">' +
          '<div class="avatar avatar--initials avatar--md">' + contact.initials + '</div>' +
          '<div class="person-item__text">' +
            '<span class="person-item__name">' + contact.name + '</span>' +
            '<span class="person-item__subtext">' + subtext + '</span>' +
          '</div>' +
          right +
        '</a>';
      }

      // Build groups HTML — only active balances
      var groupsHtml = '';
      Store.getGroups().forEach(function(g) {
        var bal = Store.getGroupBalance(g.id);
        if (bal.direction !== 'settled') groupsHtml += groupRow(g, bal);
      });

      // Build people HTML — only active balances
      var peopleHtml = '';
      Store.getContacts().forEach(function(c) {
        var bal = Store.getContactBalance(c.id);
        if (bal.direction !== 'settled') peopleHtml += personRow(c, bal);
      });

      var searchInput = document.querySelector('.search-input input');

      function render(filter) {
        filter = (filter || '').toLowerCase();
        document.getElementById('js-groups-list').innerHTML = groupsHtml;
        document.getElementById('js-people-list').innerHTML = peopleHtml;

        if (filter) {
          document.querySelectorAll('.person-item').forEach(function(row) {
            var name = row.querySelector('.person-item__name').textContent.toLowerCase();
            row.style.display = name.includes(filter) ? '' : 'none';
          });
        }

        // Show/hide section labels based on content
        var groupsVisible = groupsHtml && (!filter || document.querySelector('#js-groups-list .person-item[style=""]') || !filter);
        document.getElementById('js-groups-label').hidden = !groupsHtml;
        document.getElementById('js-people-label').hidden = !peopleHtml;
      }

      render();
      searchInput.addEventListener('input', function() { render(this.value); });
    }());
  </script>

</body>
</html>
