<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Settlr — Settled!</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/index.css">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-body);
      background: var(--surface-primary);
      color: var(--text-primary);
      max-width: 393px;
      margin: 0 auto;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Success Content ── */
    .success-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--spacing-32) var(--spacing-24);
      gap: var(--spacing-16);
      text-align: center;
    }

    /* ── Checkmark ── */
    .success-check {
      width: 88px;
      height: 88px;
      border-radius: var(--radius-full);
      background: var(--label-success-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s both;
    }
    .success-check i {
      font-size: 44px;
      color: var(--expense-lent-fg);
      animation: checkDraw 0.4s ease 0.6s both;
    }
    @keyframes scaleIn {
      from { transform: scale(0); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    @keyframes checkDraw {
      from { opacity: 0; transform: scale(0.5); }
      to { opacity: 1; transform: scale(1); }
    }

    /* ── Heading ── */
    .success-heading {
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: var(--weight-black);
      letter-spacing: -0.84px;
      line-height: 34px;
      color: var(--expense-lent-fg);
      animation: fadeUp 0.4s ease 0.8s both;
    }

    /* ── Details ── */
    .success-details {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--spacing-8);
      animation: fadeUp 0.4s ease 1s both;
    }
    .success-avatar {
      width: 48px;
      height: 48px;
      border-radius: var(--radius-full);
      background: var(--contact-avatar-bg);
      color: var(--contact-avatar-fg);
      font-family: var(--font-body);
      font-size: 16px;
      font-weight: var(--weight-semibold);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: var(--spacing-4);
    }
    .success-summary {
      font-family: var(--font-body);
      font-size: 15px;
      font-weight: var(--weight-regular);
      line-height: 22px;
      color: var(--input-label);
    }
    .success-summary strong {
      font-weight: var(--weight-semibold);
      color: var(--text-primary);
    }
    .success-amount {
      font-family: var(--font-display);
      font-size: var(--font-size-24);
      font-weight: var(--weight-bold);
      letter-spacing: -0.72px;
      color: var(--text-primary);
    }
    .success-method {
      display: inline-flex;
      align-items: center;
      gap: var(--spacing-4);
      padding: 4px 12px;
      border-radius: var(--radius-full);
      background: var(--btn-icon-bg);
      font-size: var(--font-size-12);
      font-weight: var(--weight-medium);
      color: var(--text-secondary);
    }
    .success-timestamp {
      font-family: var(--font-body);
      font-size: var(--font-size-12);
      color: var(--contact-settled-fg);
      margin-top: var(--spacing-4);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── Confetti dots (decorative) ── */
    .confetti {
      position: fixed;
      inset: 0;
      max-width: 393px;
      margin: 0 auto;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }
    .confetti__dot {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: var(--radius-full);
      animation: confettiFall 2s ease-out both;
    }
    @keyframes confettiFall {
      0% { opacity: 1; transform: translateY(-20px) rotate(0deg) scale(1); }
      100% { opacity: 0; transform: translateY(120px) rotate(360deg) scale(0.3); }
    }

    /* ── Bottom Actions ── */
    .bottom-actions {
      padding: var(--spacing-12) var(--spacing-16) var(--spacing-32);
      display: flex;
      flex-direction: column;
      gap: var(--spacing-12);
      animation: fadeUp 0.4s ease 1.2s both;
    }
    .btn-done {
      display: flex;
      width: 100%;
      height: 52px;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-full);
      border: none;
      cursor: pointer;
      font-family: var(--font-body);
      font-size: 16px;
      font-weight: var(--weight-semibold);
      background: var(--btn-primary-bg);
      color: var(--btn-primary-fg);
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-done:active { background: var(--btn-primary-bg-pressed); }
    .btn-view {
      display: flex;
      width: 100%;
      height: 44px;
      align-items: center;
      justify-content: center;
      border: none;
      background: transparent;
      cursor: pointer;
      font-family: var(--font-body);
      font-size: var(--font-size-14);
      font-weight: var(--weight-semibold);
      color: var(--btn-ghost-fg);
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
    }
  </style>
</head>
<body>

  <!-- ── Status Bar ── -->
  <div class="status-bar">
    <span class="status-bar__time">9:41</span>
    <div class="status-bar__icons">
      <svg width="17" height="12" viewBox="0 0 17 12" fill="none"><rect x="0" y="4" width="3" height="8" rx="1" fill="currentColor"/><rect x="4.5" y="2.5" width="3" height="9.5" rx="1" fill="currentColor"/><rect x="9" y="1" width="3" height="11" rx="1" fill="currentColor"/><rect x="13.5" y="0" width="3" height="12" rx="1" fill="currentColor" opacity="0.35"/></svg>
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M8 9.5a1.25 1.25 0 1 0 0 2.5 1.25 1.25 0 0 0 0-2.5z" fill="currentColor"/><path d="M3.5 6.2C4.9 4.8 6.9 4 9 4s4.1.8 5.5 2.2l-1.5 1.5C11.9 6.6 10.5 6 9 6S6.1 6.6 5 7.7L3.5 6.2z" fill="currentColor"/><path d="M.5 3.2C2.4 1.2 5.6 0 9 0s6.6 1.2 8.5 3.2L16 4.7C14.5 3 11.9 2 9 2S3.5 3 2 4.7L.5 3.2z" fill="currentColor"/></svg>
      <svg width="25" height="12" viewBox="0 0 25 12" fill="none"><rect x="0.5" y="0.5" width="21" height="11" rx="3.5" stroke="currentColor" stroke-opacity="0.35"/><rect x="2" y="2" width="18" height="8" rx="2" fill="currentColor"/><path d="M23 4v4a2 2 0 0 0 0-4z" fill="currentColor" fill-opacity="0.4"/></svg>
    </div>
  </div>

  <!-- ── Confetti (decorative) ── -->
  <div class="confetti">
    <div class="confetti__dot" style="left: 15%; top: 20%; background: var(--color-olive-300); animation-delay: 0.3s;"></div>
    <div class="confetti__dot" style="left: 30%; top: 15%; background: var(--color-green-300); animation-delay: 0.5s;"></div>
    <div class="confetti__dot" style="left: 55%; top: 18%; background: var(--color-olive-400); animation-delay: 0.4s;"></div>
    <div class="confetti__dot" style="left: 75%; top: 22%; background: var(--color-green-200); animation-delay: 0.6s;"></div>
    <div class="confetti__dot" style="left: 85%; top: 16%; background: var(--color-olive-200); animation-delay: 0.35s;"></div>
    <div class="confetti__dot" style="left: 45%; top: 12%; background: var(--color-green-400); animation-delay: 0.55s;"></div>
    <div class="confetti__dot" style="left: 10%; top: 25%; background: var(--color-olive-500); animation-delay: 0.7s;"></div>
    <div class="confetti__dot" style="left: 65%; top: 28%; background: var(--color-green-100); animation-delay: 0.45s;"></div>
  </div>

  <!-- ── Success Content ── -->
  <div class="success-content">

    <!-- Checkmark -->
    <div class="success-check">
      <i class="ph-bold ph-check"></i>
    </div>

    <!-- Heading -->
    <h1 class="success-heading">Settled!</h1>

    <!-- Details -->
    <div class="success-details">
      <div class="success-avatar" id="js-avatar">JW</div>
      <p class="success-summary" id="js-summary">You paid <strong>Johnnie Walker</strong></p>
      <p class="success-amount" id="js-amount">₹1,220</p>
      <span class="success-method" id="js-method">💳 via UPI</span>
      <p class="success-timestamp" id="js-ts"></p>
    </div>

  </div>

  <!-- ── Bottom Actions ── -->
  <div class="bottom-actions">
    <a href="home-dashboard" class="btn-done">Done</a>
    <a href="individual-detail" class="btn-view" id="js-view-link">View Details</a>
  </div>

  <script src="../js/store.js"></script>
  <script>
    (function () {
      var state = JSON.parse(sessionStorage.getItem('settlr_settle') || '{}');
      if (state.contactInitials) document.getElementById('js-avatar').textContent = state.contactInitials;
      if (state.contactName) {
        var verb = state.direction === 'lent' ? 'received from' : 'paid';
        document.getElementById('js-summary').innerHTML = 'You ' + verb + ' <strong>' + state.contactName + '</strong>';
      }
      if (state.amount) {
        var formatted = '₹' + new Intl.NumberFormat('en-IN').format(Math.round(state.amount * 100) / 100);
        document.getElementById('js-amount').textContent = formatted;
      }
      var methodIcons = { 'UPI': '💳', 'Cash': '💵', 'Bank Transfer': '🏦', 'Other': '📝' };
      var method = state.method || 'Other';
      document.getElementById('js-method').textContent = (methodIcons[method] || '📝') + ' via ' + method;
      var now = new Date();
      var today = now.toISOString().slice(0, 10);
      document.getElementById('js-ts').textContent = now.toLocaleDateString('en-IN', { day: 'numeric', month: 'long', year: 'numeric' });
      if (state.contactId) {
        document.getElementById('js-view-link').href = 'individual-detail?id=' + state.contactId;
      }

      // Record settlement in Store before clearing sessionStorage
      if (state.contactId && state.amount) {
        var me = Store.getCurrentUser();
        // direction 'owe' = DR pays contact; direction 'lent' = contact pays DR
        Store.recordSettlement({
          fromId: state.direction === 'owe' ? me.id : state.contactId,
          toId:   state.direction === 'owe' ? state.contactId : me.id,
          amount: state.amount,
          method: state.method || 'Other',
          date:   today
        });
      }

      sessionStorage.removeItem('settlr_settle');
    }());
  </script>

</body>
</html>
