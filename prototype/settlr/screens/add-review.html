<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Settlr — Review</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/index.css">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-body);
      background: var(--surface-primary);
      color: var(--text-primary);
      max-width: 393px;
      margin: 0 auto;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Scroll Content ── */
    .scroll-content {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      display: flex;
      flex-direction: column;
      gap: var(--spacing-16);
      padding-bottom: 100px;
    }

    /* ── Expense Hero ── */
    .expense-hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--spacing-12);
      padding: var(--spacing-24) var(--spacing-24) var(--spacing-20);
      margin: var(--spacing-8) var(--spacing-16) 0;
      border-radius: var(--radius-16);
      background: var(--surface-card);
      border: var(--border-small) solid var(--border-subtle);
      text-align: center;
    }
    .expense-hero__category {
      display: inline-flex;
      align-items: center;
      gap: var(--spacing-4);
      padding: 4px 12px;
      border-radius: var(--radius-full);
      background: var(--btn-icon-bg);
      font-size: var(--font-size-12);
      font-weight: var(--weight-medium);
      color: var(--text-secondary);
    }
    .expense-hero__amount {
      font-family: var(--font-display);
      font-size: 36px;
      font-weight: var(--weight-bold);
      line-height: 40px;
      letter-spacing: -1.44px;
      color: var(--text-primary);
    }
    .expense-hero__desc {
      font-size: var(--font-size-16);
      font-weight: var(--weight-bold);
      line-height: 24px;
      color: var(--text-primary);
    }
    .expense-hero__date {
      font-size: var(--font-size-12);
      font-weight: var(--weight-regular);
      line-height: 19px;
      color: var(--contact-settled-fg);
    }
    .expense-hero__balance {
      display: flex;
      align-items: center;
      padding: var(--spacing-8) var(--spacing-16);
      border-radius: var(--radius-8);
      background: var(--expense-lent-bg);
      width: 100%;
      justify-content: space-between;
    }
    .expense-hero__balance-label {
      font-size: 13px;
      font-weight: var(--weight-semibold);
      color: var(--expense-lent-fg);
    }
    .expense-hero__balance-amount {
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: var(--weight-bold);
      letter-spacing: -0.32px;
      color: var(--expense-lent-fg);
    }

    /* ── Detail Rows ── */
    .detail-section {
      padding: 0 var(--spacing-16);
      display: flex;
      flex-direction: column;
    }
    .detail-row {
      display: flex;
      align-items: center;
      gap: var(--spacing-12);
      padding: var(--spacing-12) 0;
      border-bottom: var(--border-small) solid var(--border-subtle);
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-row__icon {
      width: 40px; height: 40px;
      border-radius: var(--radius-8);
      background: var(--btn-icon-bg);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }
    .detail-row__text { flex: 1; display: flex; flex-direction: column; gap: var(--spacing-2); }
    .detail-row__label { font-size: var(--font-size-12); font-weight: var(--weight-regular); line-height: 19px; color: var(--text-tertiary); }
    .detail-row__value { font-size: var(--font-size-14); font-weight: var(--weight-semibold); color: var(--text-primary); }

    /* ── Section Divider ── */
    .section-divider { height: 8px; background: var(--btn-icon-bg); }

    /* ── Split Breakdown ── */
    .split-section {
      padding: 0 var(--spacing-16);
      display: flex; flex-direction: column; gap: var(--spacing-4);
    }
    .split-section__header {
      display: flex; align-items: center; justify-content: space-between;
      padding: var(--spacing-12) 0 var(--spacing-8);
    }
    .split-section__label {
      font-size: 11px; font-weight: var(--weight-semibold);
      letter-spacing: 1.76px; text-transform: uppercase;
      color: var(--text-tertiary);
    }
    .split-section__method {
      font-size: var(--font-size-12); font-weight: var(--weight-medium);
      color: var(--text-brand);
    }
    .split-person {
      display: flex; align-items: center; gap: var(--spacing-12);
      padding: var(--spacing-8) 0;
    }
    .split-person__avatar {
      width: 32px; height: 32px; border-radius: var(--radius-full);
      background: var(--contact-avatar-bg); color: var(--contact-avatar-fg);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: var(--weight-semibold); flex-shrink: 0;
    }
    .split-person__name { flex: 1; font-size: var(--font-size-14); font-weight: var(--weight-semibold); color: var(--text-primary); }
    .split-person__amount { font-size: var(--font-size-14); font-weight: var(--weight-semibold); }
    .split-person__amount--self { color: var(--expense-settled-fg); }
    .split-person__amount--lent { color: var(--expense-lent-fg); }
    .split-person__amount--owe { color: var(--expense-owe-fg); }

    /* ── Notes / Description ── */
    .notes-section { padding: 0 var(--spacing-16); }
    .notes-card {
      padding: var(--spacing-12) var(--spacing-16);
      border-radius: var(--radius-12);
      background: var(--surface-card);
      border: var(--border-small) solid var(--border-subtle);
    }
    .notes-card__label {
      font-size: 11px; font-weight: var(--weight-semibold);
      letter-spacing: 1.76px; text-transform: uppercase;
      color: var(--text-tertiary); margin-bottom: var(--spacing-8);
    }
    .notes-card__input {
      width: 100%; background: transparent; border: none; outline: none;
      font-family: var(--font-body); font-size: var(--font-size-14);
      font-weight: var(--weight-regular); line-height: 23px;
      color: var(--input-label);
      resize: none; min-height: 48px;
    }
    .notes-card__input::placeholder { color: var(--input-fg-default); }

    /* ── Fixed Bottom Dock ── */
    .bottom-dock {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      max-width: 393px; margin: 0 auto;
      padding: var(--spacing-12) var(--spacing-16) var(--spacing-32);
      background: var(--surface-card);
      border-top: var(--border-small) solid var(--border-subtle);
    }
    .btn-add {
      display: flex; width: 100%; height: 52px;
      align-items: center; justify-content: center; gap: var(--spacing-8);
      border-radius: var(--radius-full); border: none; cursor: pointer;
      font-family: var(--font-body); font-size: 16px; font-weight: var(--weight-semibold);
      background: var(--btn-primary-bg); color: var(--btn-primary-fg);
      text-decoration: none; -webkit-tap-highlight-color: transparent;
    }
    .btn-add:active { background: var(--btn-primary-bg-pressed); }
  </style>
</head>
<body>

  <!-- Status Bar -->
  <div class="status-bar">
    <span class="status-bar__time">9:41</span>
    <div class="status-bar__icons">
      <svg width="17" height="12" viewBox="0 0 17 12" fill="none"><rect x="0" y="4" width="3" height="8" rx="1" fill="currentColor"/><rect x="4.5" y="2.5" width="3" height="9.5" rx="1" fill="currentColor"/><rect x="9" y="1" width="3" height="11" rx="1" fill="currentColor"/><rect x="13.5" y="0" width="3" height="12" rx="1" fill="currentColor" opacity="0.35"/></svg>
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M8 9.5a1.25 1.25 0 1 0 0 2.5 1.25 1.25 0 0 0 0-2.5z" fill="currentColor"/><path d="M3.5 6.2C4.9 4.8 6.9 4 9 4s4.1.8 5.5 2.2l-1.5 1.5C11.9 6.6 10.5 6 9 6S6.1 6.6 5 7.7L3.5 6.2z" fill="currentColor"/><path d="M.5 3.2C2.4 1.2 5.6 0 9 0s6.6 1.2 8.5 3.2L16 4.7C14.5 3 11.9 2 9 2S3.5 3 2 4.7L.5 3.2z" fill="currentColor"/></svg>
      <svg width="25" height="12" viewBox="0 0 25 12" fill="none"><rect x="0.5" y="0.5" width="21" height="11" rx="3.5" stroke="currentColor" stroke-opacity="0.35"/><rect x="2" y="2" width="18" height="8" rx="2" fill="currentColor"/><path d="M23 4v4a2 2 0 0 0 0-4z" fill="currentColor" fill-opacity="0.4"/></svg>
    </div>
  </div>

  <!-- Top Bar -->
  <header class="top-app-bar top-app-bar--nav">
    <a href="add-split" class="top-app-bar__back">
      <i class="ph-bold ph-caret-left"></i>
    </a>
    <span class="top-app-bar__title">Review</span>
  </header>

  <!-- Step Progress -->
  <div class="step-progress">
    <div class="step-progress__step step-progress__step--active"></div>
    <div class="step-progress__step step-progress__step--active"></div>
    <div class="step-progress__step step-progress__step--active"></div>
  </div>

  <!-- Scrollable Content -->
  <div class="scroll-content">

    <!-- Expense Hero -->
    <div class="expense-hero" id="js-hero">
      <span class="expense-hero__category" id="js-category">—</span>
      <div class="expense-hero__amount" id="js-amount">—</div>
      <div class="expense-hero__desc" id="js-desc">—</div>
      <div class="expense-hero__date" id="js-date">—</div>
      <div class="expense-hero__balance" id="js-balance">
        <span class="expense-hero__balance-label" id="js-balance-label">—</span>
        <span class="expense-hero__balance-amount" id="js-balance-amount">—</span>
      </div>
    </div>

    <!-- Details Section -->
    <div class="detail-section" id="js-details"></div>

    <!-- Section Divider -->
    <div class="section-divider"></div>

    <!-- Split Breakdown -->
    <div class="split-section">
      <div class="split-section__header">
        <span class="split-section__label">Split Breakdown</span>
        <span class="split-section__method" id="js-split-method">—</span>
      </div>
      <div id="js-split-list"></div>
    </div>

    <!-- Section Divider -->
    <div class="section-divider"></div>

    <!-- Notes -->
    <div class="notes-section">
      <div class="notes-card">
        <div class="notes-card__label">Notes (optional)</div>
        <textarea id="js-notes" class="notes-card__input" rows="2" placeholder="Add a note for this expense…"></textarea>
      </div>
    </div>

  </div>

  <!-- Fixed Bottom Dock -->
  <div class="bottom-dock">
    <button id="js-add" class="btn-add">Add Expense</button>
  </div>

  <script src="../js/store.js"></script>
  <script>
    (function () {
      var ctx = JSON.parse(sessionStorage.getItem('settlr_new_expense') || '{}');
      if (!ctx.totalAmount || !ctx.splitAmong) { location.replace('add-amount'); return; }

      var me = Store.getCurrentUser();
      var meId = me.id;
      var total = ctx.totalAmount;
      var pp = ctx.perPerson || Math.round(total / ctx.splitAmong.length * 100) / 100;
      var paidById = ctx.paidById || meId;
      var iMePaying = paidById === meId;
      var splitMode = ctx.splitMethod || 'equal';
      var modeLabel = { equal: 'Equal split', amount: 'Custom amount', percent: 'By percentage', shares: 'By shares' }[splitMode] || 'Equal split';

      function amountFor(id) {
        if (ctx.splitAmounts && ctx.splitAmounts[id] != null) return ctx.splitAmounts[id];
        return pp;
      }
      var myAmount = amountFor(meId);

      function fmt(n) {
        return '₹' + new Intl.NumberFormat('en-IN', { maximumFractionDigits: 2, minimumFractionDigits: 0 }).format(Math.round(n * 100) / 100);
      }

      function nameFor(id) {
        if (id === meId) return 'You';
        var c = Store.getContact(id);
        return c ? c.name.split(' ')[0] : id;
      }
      function fullNameFor(id) {
        if (id === meId) return 'You';
        var c = Store.getContact(id);
        return c ? c.name : id;
      }
      function initialsFor(id) {
        if (id === meId) return me.initials || 'DR';
        var c = Store.getContact(id);
        return c ? c.initials : id.slice(0,2).toUpperCase();
      }

      // Hero
      document.getElementById('js-category').textContent = (ctx.emoji || '') + ' ' + (ctx.category || 'Other');
      document.getElementById('js-amount').textContent = fmt(total);
      document.getElementById('js-desc').textContent = ctx.title || '';

      var d = new Date(ctx.date + 'T00:00:00');
      var dateStr = d.toLocaleDateString('en-IN', { day: 'numeric', month: 'long', year: 'numeric' });
      document.getElementById('js-date').textContent = dateStr;

      // Balance pill
      var bal = document.getElementById('js-balance');
      var balLabelEl = document.getElementById('js-balance-label');
      var balAmountEl = document.getElementById('js-balance-amount');
      if (iMePaying) {
        var getBack = Math.round((total - myAmount) * 100) / 100;
        bal.style.background = 'var(--expense-lent-bg)';
        balLabelEl.style.color = 'var(--expense-lent-fg)';
        balLabelEl.textContent = 'You get back';
        balAmountEl.style.color = 'var(--expense-lent-fg)';
        balAmountEl.textContent = fmt(getBack);
      } else {
        bal.style.background = 'var(--expense-owe-bg)';
        balLabelEl.style.color = 'var(--expense-owe-fg)';
        balLabelEl.textContent = 'You owe';
        balAmountEl.style.color = 'var(--expense-owe-fg)';
        balAmountEl.textContent = fmt(myAmount);
      }

      // Details
      var detailsHtml = '';
      if (ctx.groupId) {
        var g = Store.getGroup(ctx.groupId);
        detailsHtml += '<div class="detail-row"><div class="detail-row__icon">👥</div><div class="detail-row__text"><span class="detail-row__label">Group</span><span class="detail-row__value">' + (g ? g.name : ctx.groupId) + '</span></div></div>';
      }
      detailsHtml += '<div class="detail-row"><div class="detail-row__icon">💳</div><div class="detail-row__text"><span class="detail-row__label">Paid by</span><span class="detail-row__value">' + nameFor(paidById) + ' paid ' + fmt(total) + '</span></div></div>';
      detailsHtml += '<div class="detail-row"><div class="detail-row__icon">📅</div><div class="detail-row__text"><span class="detail-row__label">Date</span><span class="detail-row__value">' + dateStr + '</span></div></div>';
      detailsHtml += '<div class="detail-row"><div class="detail-row__icon">🔄</div><div class="detail-row__text"><span class="detail-row__label">Split method</span><span class="detail-row__value">' + modeLabel + '</span></div></div>';
      document.getElementById('js-details').innerHTML = detailsHtml;

      // Split breakdown
      var n = ctx.splitAmong.length;
      document.getElementById('js-split-method').textContent = n + ' ' + (n === 1 ? 'person' : 'people') + ' · ' + modeLabel;
      document.getElementById('js-split-list').innerHTML = ctx.splitAmong.map(function(id) {
        var isMe = id === meId;
        var isPayer = id === paidById;
        var personAmt = amountFor(id);
        var amtCls, amtText;
        if (isMe && isPayer) {
          amtCls = 'split-person__amount--self';
          amtText = fmt(personAmt);
        } else if (isPayer) {
          amtCls = 'split-person__amount--lent';
          amtText = 'gets back ' + fmt(Math.round((total - personAmt) * 100) / 100);
        } else if (isMe) {
          amtCls = 'split-person__amount--owe';
          amtText = 'owes ' + fmt(personAmt);
        } else {
          amtCls = 'split-person__amount--lent';
          amtText = 'owes ' + fmt(personAmt);
        }
        return '<div class="split-person">' +
          '<div class="split-person__avatar">' + initialsFor(id) + '</div>' +
          '<span class="split-person__name">' + fullNameFor(id) + '</span>' +
          '<span class="split-person__amount ' + amtCls + '">' + amtText + '</span>' +
        '</div>';
      }).join('');

      // Add expense
      document.getElementById('js-add').addEventListener('click', function() {
        var notes = document.getElementById('js-notes').value.trim();
        var expense = {
          title: ctx.title,
          emoji: ctx.emoji || '📝',
          category: ctx.category || 'Other',
          totalAmount: total,
          paidById: paidById,
          splitAmong: ctx.splitAmong,
          splitMethod: splitMode,
          splitAmounts: ctx.splitAmounts || null,
          date: ctx.date,
          notes: notes,
          groupId: ctx.groupId || null,
          contactId: ctx.contactIds && ctx.contactIds.length === 1 ? ctx.contactIds[0] : null
        };
        Store.addExpense(expense);
        sessionStorage.removeItem('settlr_new_expense');
        location.href = 'home-dashboard';
      });
    }());
  </script>

</body>
</html>
