<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Settlr — Edit Expense</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/index.css">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-body);
      background: var(--surface-primary);
      color: var(--text-primary);
      max-width: 393px;
      margin: 0 auto;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Top Bar ── */
    .top-bar { display: flex; align-items: center; gap: var(--spacing-8); padding: var(--spacing-8) var(--spacing-16); flex-shrink: 0; }
    .top-bar__back { width: 40px; height: 40px; border-radius: var(--radius-full); background: var(--btn-icon-bg); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--btn-icon-fg); text-decoration: none; -webkit-tap-highlight-color: transparent; flex-shrink: 0; }
    .top-bar__back:active { background: var(--btn-icon-bg-pressed); }
    .top-bar__back i { font-size: var(--font-size-20); }
    .top-bar__title { flex: 1; font-family: var(--font-display); font-size: var(--font-size-20); font-weight: var(--weight-bold); line-height: 26px; letter-spacing: -0.40px; color: var(--top-app-bar-title); }

    /* ── Scrollable Content ── */
    .scroll-content {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: var(--spacing-8) var(--spacing-24) var(--spacing-24);
      display: flex;
      flex-direction: column;
      gap: var(--spacing-24);
    }

    /* ── Amount Display (editable) ── */
    .amount-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--spacing-8);
      padding: var(--spacing-16) 0;
    }
    .currency-badge {
      display: inline-flex;
      align-items: center;
      gap: var(--spacing-4);
      padding: 4px 10px;
      border-radius: var(--radius-full);
      background: var(--btn-icon-bg);
      font-family: var(--font-body);
      font-size: var(--font-size-12);
      font-weight: var(--weight-medium);
      color: var(--text-secondary);
    }
    .amount-input-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--spacing-4);
      width: 100%;
    }
    .amount-input-wrap__symbol {
      font-family: var(--font-display);
      font-size: 36px;
      font-weight: var(--weight-bold);
      letter-spacing: -1.44px;
      color: var(--text-primary);
    }
    .amount-input-wrap input {
      border: none;
      outline: none;
      background: transparent;
      font-family: var(--font-display);
      font-size: 36px;
      font-weight: var(--weight-bold);
      letter-spacing: -1.44px;
      color: var(--text-primary);
      text-align: center;
      width: 180px;
      caret-color: var(--text-brand);
    }

    /* ── Field Group ── */
    .field {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-4);
    }
    .field__label {
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: var(--weight-regular);
      line-height: 19px;
      color: var(--input-label);
    }
    .field__input {
      width: 100%;
      height: 48px;
      padding: 0 var(--spacing-16);
      border-radius: var(--radius-12);
      border: var(--border-medium) solid var(--input-border-default);
      background: var(--input-bg);
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: var(--weight-regular);
      line-height: 23px;
      color: var(--input-fg-active);
      outline: none;
      transition: all 0.15s ease;
    }
    .field__input:focus {
      background: var(--input-bg-focused);
      border-color: var(--input-border-focused);
    }

    /* ── Category Chips ── */
    .chips-section {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-8);
    }
    .chips-row {
      display: flex;
      gap: var(--spacing-8);
      overflow-x: auto;
      scrollbar-width: none;
    }
    .chips-row::-webkit-scrollbar { display: none; }
    .cat-chip {
      display: inline-flex;
      align-items: center;
      gap: var(--spacing-4);
      padding: 6px 12px;
      border-radius: var(--radius-full);
      border: var(--border-medium) solid var(--border-default);
      background: var(--surface-card);
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: var(--weight-medium);
      color: var(--input-label);
      cursor: pointer;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
      transition: all 0.15s ease;
    }
    .cat-chip.is-selected {
      background: var(--chip-bg-on);
      border-color: var(--chip-border-on);
      color: var(--chip-fg-on);
    }

    /* ── Selector Row (Paid by, Group, Date, Split) ── */
    .selector-row {
      display: flex;
      align-items: center;
      gap: var(--spacing-12);
      padding: var(--spacing-12) var(--spacing-16);
      border-radius: var(--radius-12);
      background: var(--surface-card);
      border: var(--border-small) solid var(--border-subtle);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .selector-row:active {
      background: var(--btn-icon-bg);
    }
    .selector-row__icon {
      width: 36px;
      height: 36px;
      border-radius: var(--radius-8);
      background: var(--btn-icon-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    .selector-row__text {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: var(--spacing-2);
    }
    .selector-row__label {
      font-family: var(--font-body);
      font-size: var(--font-size-12);
      font-weight: var(--weight-regular);
      color: var(--text-tertiary);
    }
    .selector-row__value {
      font-family: var(--font-body);
      font-size: var(--font-size-14);
      font-weight: var(--weight-semibold);
      color: var(--text-primary);
    }
    .selector-row__chevron {
      font-size: 18px;
      color: var(--input-fg-default);
      flex-shrink: 0;
    }

    /* ── Notes Field ── */
    .field__textarea {
      width: 100%;
      min-height: 80px;
      padding: var(--spacing-12) var(--spacing-16);
      border-radius: var(--radius-12);
      border: var(--border-medium) solid var(--input-border-default);
      background: var(--input-bg);
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: var(--weight-regular);
      line-height: 23px;
      color: var(--input-fg-active);
      outline: none;
      resize: none;
      transition: all 0.15s ease;
    }
    .field__textarea:focus {
      background: var(--input-bg-focused);
      border-color: var(--input-border-focused);
    }

    /* ── Bottom CTA ── */
    .bottom-cta {
      padding: var(--spacing-12) var(--spacing-24) var(--spacing-32);
      display: flex;
      flex-direction: column;
      gap: var(--spacing-12);
      flex-shrink: 0;
    }
    .btn-save {
      display: flex;
      width: 100%;
      height: 52px;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-full);
      border: none;
      cursor: pointer;
      font-family: var(--font-body);
      font-size: 16px;
      font-weight: var(--weight-semibold);
      background: var(--btn-primary-bg);
      color: var(--btn-primary-fg);
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-save:active { background: var(--btn-primary-bg-pressed); }
    .btn-cancel {
      display: flex;
      width: 100%;
      height: 44px;
      align-items: center;
      justify-content: center;
      border: none;
      background: transparent;
      cursor: pointer;
      font-family: var(--font-body);
      font-size: var(--font-size-14);
      font-weight: var(--weight-semibold);
      color: var(--text-tertiary);
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
    }
  </style>
</head>
<body>

  <!-- ── Status Bar ── -->
  <div class="status-bar">
    <span class="status-bar__time">9:41</span>
    <div class="status-bar__icons">
      <svg width="17" height="12" viewBox="0 0 17 12" fill="none"><rect x="0" y="4" width="3" height="8" rx="1" fill="currentColor"/><rect x="4.5" y="2.5" width="3" height="9.5" rx="1" fill="currentColor"/><rect x="9" y="1" width="3" height="11" rx="1" fill="currentColor"/><rect x="13.5" y="0" width="3" height="12" rx="1" fill="currentColor" opacity="0.35"/></svg>
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M8 9.5a1.25 1.25 0 1 0 0 2.5 1.25 1.25 0 0 0 0-2.5z" fill="currentColor"/><path d="M3.5 6.2C4.9 4.8 6.9 4 9 4s4.1.8 5.5 2.2l-1.5 1.5C11.9 6.6 10.5 6 9 6S6.1 6.6 5 7.7L3.5 6.2z" fill="currentColor"/><path d="M.5 3.2C2.4 1.2 5.6 0 9 0s6.6 1.2 8.5 3.2L16 4.7C14.5 3 11.9 2 9 2S3.5 3 2 4.7L.5 3.2z" fill="currentColor"/></svg>
      <svg width="25" height="12" viewBox="0 0 25 12" fill="none"><rect x="0.5" y="0.5" width="21" height="11" rx="3.5" stroke="currentColor" stroke-opacity="0.35"/><rect x="2" y="2" width="18" height="8" rx="2" fill="currentColor"/><path d="M23 4v4a2 2 0 0 0 0-4z" fill="currentColor" fill-opacity="0.4"/></svg>
    </div>
  </div>

  <!-- ── Top Bar ── -->
  <header class="top-bar">
    <a href="expense-detail" class="top-bar__back" aria-label="Back">
      <i class="ph-bold ph-caret-left"></i>
    </a>
    <span class="top-bar__title">Edit Expense</span>
  </header>

  <!-- ── Scrollable Content ── -->
  <div class="scroll-content">

    <!-- Amount -->
    <div class="amount-area">
      <span class="currency-badge">₹ INR</span>
      <div class="amount-input-wrap">
        <span class="amount-input-wrap__symbol">₹</span>
        <input type="text" inputmode="decimal" value="850">
      </div>
    </div>

    <!-- Description -->
    <div class="field">
      <label class="field__label">Description</label>
      <input type="text" class="field__input" value="Dinner at Olive">
    </div>

    <!-- Category -->
    <div class="chips-section">
      <span class="field__label">Category</span>
      <div class="chips-row">
        <span class="cat-chip is-selected" onclick="selectCat(this)">🍽 Food</span>
        <span class="cat-chip" onclick="selectCat(this)">✈️ Travel</span>
        <span class="cat-chip" onclick="selectCat(this)">🛍 Shopping</span>
        <span class="cat-chip" onclick="selectCat(this)">📄 Bills</span>
        <span class="cat-chip" onclick="selectCat(this)">📦 Other</span>
      </div>
    </div>

    <!-- Paid by -->
    <div class="selector-row">
      <div class="selector-row__icon">💳</div>
      <div class="selector-row__text">
        <span class="selector-row__label">Paid by</span>
        <span class="selector-row__value">You paid ₹850</span>
      </div>
      <i class="ph ph-caret-right selector-row__chevron"></i>
    </div>

    <!-- Group -->
    <div class="selector-row">
      <div class="selector-row__icon">🏝</div>
      <div class="selector-row__text">
        <span class="selector-row__label">Group</span>
        <span class="selector-row__value">Goa Trip</span>
      </div>
      <i class="ph ph-caret-right selector-row__chevron"></i>
    </div>

    <!-- Date -->
    <div class="selector-row">
      <div class="selector-row__icon">📅</div>
      <div class="selector-row__text">
        <span class="selector-row__label">Date</span>
        <span class="selector-row__value">17 March 2026</span>
      </div>
      <i class="ph ph-caret-right selector-row__chevron"></i>
    </div>

    <!-- Split -->
    <div class="selector-row">
      <div class="selector-row__icon">🔄</div>
      <div class="selector-row__text">
        <span class="selector-row__label">Split method</span>
        <span class="selector-row__value">Equal split · 4 people</span>
      </div>
      <i class="ph ph-caret-right selector-row__chevron"></i>
    </div>

    <!-- Notes -->
    <div class="field">
      <label class="field__label">Notes (optional)</label>
      <textarea class="field__textarea">Birthday dinner for Priya. Included drinks and dessert. Everyone had a great time! 🎂</textarea>
    </div>

  </div>

  <!-- ── Bottom CTA ── -->
  <div class="bottom-cta">
    <a href="expense-detail" class="btn-save">Save Changes</a>
    <a href="expense-detail" class="btn-cancel">Discard Changes</a>
  </div>

  <script>
    function selectCat(el) {
      document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('is-selected'));
      el.classList.add('is-selected');
    }
  </script>

</body>
</html>
