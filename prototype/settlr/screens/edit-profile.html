<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Settlr — Edit Profile</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../tokens/index.css">
  <link rel="stylesheet" href="../css/index.css">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-body);
      background: var(--surface-primary);
      color: var(--text-primary);
      max-width: 393px;
      margin: 0 auto;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Status Bar ── */
    .status-bar {
      height: 44px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 var(--spacing-16);
      background: var(--surface-primary);
    }
    .status-bar__time {
      font-family: var(--font-body);
      font-size: var(--font-size-14);
      font-weight: var(--weight-semibold);
      line-height: var(--line-height-20);
      letter-spacing: -0.5px;
      color: var(--text-primary);
    }
    .status-bar__icons {
      display: flex;
      align-items: center;
      gap: var(--spacing-4);
      color: var(--text-primary);
    }

    /* ── Top Bar ── */
    .top-bar {
      display: flex;
      align-items: center;
      gap: var(--spacing-8);
      padding: var(--spacing-8) var(--spacing-16);
      background: var(--surface-primary);
      flex-shrink: 0;
    }
    .top-bar__back {
      width: 40px;
      height: 40px;
      border-radius: var(--radius-full);
      background: var(--btn-icon-bg);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--btn-icon-fg);
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
    }
    .top-bar__back:active { background: var(--btn-icon-bg-pressed); }
    .top-bar__back i { font-size: var(--icon-md); }
    .top-bar__title {
      flex: 1;
      font-family: var(--font-display);
      font-size: var(--font-size-20);
      font-weight: var(--weight-bold);
      line-height: var(--line-height-26);
      letter-spacing: -0.40px;
      color: var(--top-app-bar-title);
    }
    .top-bar__save {
      font-family: var(--font-body);
      font-size: var(--font-size-14);
      font-weight: var(--weight-semibold);
      color: var(--btn-primary-fg);
      background: var(--btn-primary-bg);
      border: none;
      cursor: pointer;
      padding: var(--spacing-8) var(--spacing-16);
      border-radius: var(--radius-full);
      -webkit-tap-highlight-color: transparent;
      white-space: nowrap;
    }
    .top-bar__save:active { background: var(--btn-primary-bg-pressed); }
    .top-bar__save:disabled {
      background: var(--border-default);
      color: var(--text-tertiary);
      cursor: default;
    }

    /* ── Scrollable Content ── */
    .content {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: var(--spacing-32);
    }

    /* ── Avatar Section ── */
    .avatar-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--spacing-12);
      padding: var(--spacing-24) var(--spacing-16) var(--spacing-16);
    }
    .avatar-wrap {
      position: relative;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .avatar {
      width: 96px;
      height: 96px;
      border-radius: var(--radius-full);
      background: var(--avatar-bg);
      color: var(--avatar-fg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-size: 30px;
      font-weight: var(--weight-bold);
      letter-spacing: -0.90px;
      border: 3px solid var(--surface-card);
      box-shadow: var(--shadow-md);
    }
    .avatar-camera {
      position: absolute;
      bottom: 2px;
      right: 2px;
      width: 32px;
      height: 32px;
      border-radius: var(--radius-full);
      background: var(--btn-primary-bg);
      border: 2px solid var(--surface-card);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--btn-primary-fg);
    }
    .avatar-camera i { font-size: var(--font-size-16); }
    .avatar-hint {
      font-family: var(--font-body);
      font-size: var(--font-size-12);
      font-weight: var(--weight-regular);
      color: var(--text-tertiary);
      line-height: var(--line-height-18);
    }

    /* ── Settlr ID Banner ── */
    .id-banner {
      margin: 0 var(--spacing-16) var(--spacing-16);
      padding: var(--spacing-12) var(--spacing-16);
      background: var(--card-create-bg);
      border-radius: var(--radius-12);
      border: var(--border-small) solid var(--card-create-border);
      display: flex;
      align-items: center;
      gap: var(--spacing-12);
    }
    .id-banner__icon {
      width: 36px;
      height: 36px;
      border-radius: var(--radius-full);
      background: var(--card-create-icon-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: var(--text-brand);
    }
    .id-banner__icon i { font-size: var(--font-size-18); }
    .id-banner__text { flex: 1; }
    .id-banner__label {
      font-family: var(--font-body);
      font-size: var(--font-size-11);
      font-weight: var(--weight-semibold);
      letter-spacing: 1.54px;
      text-transform: uppercase;
      color: var(--text-brand);
      line-height: var(--line-height-16);
    }
    .id-banner__value {
      font-family: var(--font-display);
      font-size: var(--font-size-18);
      font-weight: var(--weight-bold);
      color: var(--text-primary);
      letter-spacing: -0.36px;
      line-height: var(--line-height-24);
      margin-top: var(--spacing-2);
    }
    .id-banner__copy {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-brand);
      padding: var(--spacing-4);
      -webkit-tap-highlight-color: transparent;
    }
    .id-banner__copy i { font-size: var(--icon-md); }

    /* ── Form ── */
    .form-section {
      padding: 0 var(--spacing-16);
      display: flex;
      flex-direction: column;
      gap: var(--spacing-16);
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-4);
    }
    .field__label {
      font-family: var(--font-body);
      font-size: var(--font-size-12);
      font-weight: var(--weight-semibold);
      color: var(--input-label);
      line-height: var(--line-height-18);
    }
    .field__label span {
      font-weight: var(--weight-regular);
      color: var(--text-tertiary);
      margin-left: var(--spacing-4);
    }
    .field__input {
      height: 52px;
      padding: 0 var(--spacing-16);
      background: var(--input-bg);
      border: var(--border-small) solid var(--input-border-default);
      border-radius: var(--radius-12);
      font-family: var(--font-body);
      font-size: var(--font-size-15);
      font-weight: var(--weight-regular);
      color: var(--input-fg-active);
      outline: none;
      width: 100%;
      transition: border-color 0.15s ease, background 0.15s ease;
      -webkit-appearance: none;
    }
    .field__input:focus {
      background: var(--input-bg-focused);
      border-color: var(--input-border-focused);
    }
    .field__input::placeholder { color: var(--input-fg-default); }
    .field__input:disabled {
      background: var(--surface-primary);
      color: var(--text-tertiary);
      cursor: not-allowed;
      border-color: var(--border-subtle);
    }
    .field__input--with-prefix {
      padding-left: 52px;
    }
    .field__helper {
      font-family: var(--font-body);
      font-size: var(--font-size-12);
      font-weight: var(--weight-regular);
      color: var(--input-helper);
      line-height: var(--line-height-18);
    }
    .field__helper--error {
      color: var(--input-helper-error);
    }
    .field__helper i { font-size: var(--font-size-12); vertical-align: middle; }

    /* input with prefix icon */
    .field__input-wrap {
      position: relative;
    }
    .field__input-prefix {
      position: absolute;
      left: var(--spacing-16);
      top: 50%;
      transform: translateY(-50%);
      font-family: var(--font-body);
      font-size: var(--font-size-15);
      font-weight: var(--weight-semibold);
      color: var(--text-tertiary);
      pointer-events: none;
    }

    /* ── Section Divider ── */
    .form-divider {
      height: 1px;
      background: var(--border-subtle);
      margin: var(--spacing-8) 0;
    }

    /* ── Bio field ── */
    .field__textarea {
      padding: var(--spacing-12) var(--spacing-16);
      background: var(--input-bg);
      border: var(--border-small) solid var(--input-border-default);
      border-radius: var(--radius-12);
      font-family: var(--font-body);
      font-size: var(--font-size-14);
      font-weight: var(--weight-regular);
      color: var(--input-fg-active);
      outline: none;
      width: 100%;
      resize: none;
      min-height: 80px;
      transition: border-color 0.15s ease, background 0.15s ease;
      line-height: var(--line-height-22);
      -webkit-appearance: none;
    }
    .field__textarea:focus {
      background: var(--input-bg-focused);
      border-color: var(--input-border-focused);
    }
    .field__textarea::placeholder { color: var(--input-fg-default); }
    .field__char-count {
      text-align: right;
      font-family: var(--font-body);
      font-size: var(--font-size-11);
      color: var(--text-tertiary);
      line-height: var(--line-height-16);
    }

    /* ── Save CTA ── */
    .save-cta {
      padding: var(--spacing-16);
      padding-top: var(--spacing-24);
    }
  </style>
</head>
<body>

  <!-- ── Status Bar ── -->
  <div class="status-bar">
    <span class="status-bar__time">9:41</span>
    <div class="status-bar__icons">
      <svg width="17" height="12" viewBox="0 0 17 12" fill="none">
        <rect x="0" y="4" width="3" height="8" rx="1" fill="currentColor"/>
        <rect x="4.5" y="2.5" width="3" height="9.5" rx="1" fill="currentColor"/>
        <rect x="9" y="1" width="3" height="11" rx="1" fill="currentColor"/>
        <rect x="13.5" y="0" width="3" height="12" rx="1" fill="currentColor" opacity="0.35"/>
      </svg>
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
        <path d="M8 9.5a1.25 1.25 0 1 0 0 2.5 1.25 1.25 0 0 0 0-2.5z" fill="currentColor"/>
        <path d="M3.5 6.2C4.9 4.8 6.9 4 9 4s4.1.8 5.5 2.2l-1.5 1.5C11.9 6.6 10.5 6 9 6S6.1 6.6 5 7.7L3.5 6.2z" fill="currentColor"/>
        <path d="M.5 3.2C2.4 1.2 5.6 0 9 0s6.6 1.2 8.5 3.2L16 4.7C14.5 3 11.9 2 9 2S3.5 3 2 4.7L.5 3.2z" fill="currentColor"/>
      </svg>
      <svg width="25" height="12" viewBox="0 0 25 12" fill="none">
        <rect x="0.5" y="0.5" width="21" height="11" rx="3.5" stroke="currentColor" stroke-opacity="0.35"/>
        <rect x="2" y="2" width="18" height="8" rx="2" fill="currentColor"/>
        <path d="M23 4v4a2 2 0 0 0 0-4z" fill="currentColor" fill-opacity="0.4"/>
      </svg>
    </div>
  </div>

  <!-- ── Top Bar ── -->
  <header class="top-bar">
    <a href="settings" class="top-bar__back" aria-label="Back">
      <i class="ph-bold ph-caret-left"></i>
    </a>
    <span class="top-bar__title">Edit Profile</span>
    <button class="top-bar__save" id="js-save-btn" onclick="saveProfile()">Save</button>
  </header>

  <!-- ── Content ── -->
  <main class="content">

    <!-- Avatar -->
    <div class="avatar-section">
      <div class="avatar-wrap" onclick="document.getElementById('js-avatar-input').click()">
        <div class="avatar" id="js-avatar">DR</div>
        <div class="avatar-camera">
          <i class="ph ph-camera"></i>
        </div>
      </div>
      <p class="avatar-hint">Tap to change photo</p>
      <input type="file" id="js-avatar-input" accept="image/*" style="display:none" onchange="previewAvatar(this)">
    </div>

    <!-- Settlr ID Banner -->
    <div class="id-banner">
      <div class="id-banner__icon">
        <i class="ph ph-at"></i>
      </div>
      <div class="id-banner__text">
        <p class="id-banner__label">Your Settlr ID</p>
        <p class="id-banner__value">@divyansh</p>
      </div>
      <button class="id-banner__copy" onclick="copyId()" aria-label="Copy ID">
        <i class="ph ph-copy"></i>
      </button>
    </div>

    <!-- Form Fields -->
    <div class="form-section">

      <!-- Display Name -->
      <div class="field">
        <label class="field__label" for="input-name">Display Name</label>
        <input
          class="field__input"
          id="input-name"
          type="text"
          value="Divyansh Rastogi"
          placeholder="Your full name"
          oninput="onFieldChange()"
          maxlength="50"
        >
      </div>

      <!-- Phone (read-only) -->
      <div class="field">
        <label class="field__label" for="input-phone">
          Phone Number
          <span>· can't be changed</span>
        </label>
        <input
          class="field__input"
          id="input-phone"
          type="tel"
          value="+91 98765 43210"
          disabled
        >
      </div>

      <div class="form-divider"></div>

      <!-- UPI ID -->
      <div class="field">
        <label class="field__label" for="input-upi">UPI ID</label>
        <div class="field__input-wrap">
          <input
            class="field__input"
            id="input-upi"
            type="text"
            value="divyansh@okaxis"
            placeholder="yourname@bank"
            oninput="onFieldChange()"
          >
        </div>
        <p class="field__helper">Used when others pay you via UPI</p>
      </div>

      <!-- Bank / Payment info note -->
      <div class="field">
        <label class="field__label" for="input-bank-name">Bank Name <span>· optional</span></label>
        <input
          class="field__input"
          id="input-bank-name"
          type="text"
          placeholder="e.g. Axis Bank, HDFC"
          oninput="onFieldChange()"
        >
      </div>

      <div class="form-divider"></div>

      <!-- Bio -->
      <div class="field">
        <label class="field__label" for="input-bio">Bio <span>· optional</span></label>
        <textarea
          class="field__textarea"
          id="input-bio"
          placeholder="A short note about you..."
          maxlength="120"
          oninput="updateCharCount(this)"
        ></textarea>
        <p class="field__char-count" id="js-char-count">0 / 120</p>
      </div>

    </div>

    <!-- Save CTA (duplicate at bottom for long forms) -->
    <div class="save-cta">
      <button class="btn btn--primary btn--lg" style="width:100%" onclick="saveProfile()">
        Save Changes
      </button>
    </div>

  </main>

  <script>
    let isDirty = false;

    function onFieldChange() {
      isDirty = true;
    }

    function updateCharCount(el) {
      onFieldChange();
      document.getElementById('js-char-count').textContent = `${el.value.length} / 120`;
    }

    function copyId() {
      navigator.clipboard?.writeText('@divyansh');
      const btn = document.querySelector('.id-banner__copy i');
      btn.className = 'ph ph-check';
      setTimeout(() => { btn.className = 'ph ph-copy'; }, 1500);
    }

    function previewAvatar(input) {
      if (!input.files?.length) return;
      const file = input.files[0];
      const reader = new FileReader();
      reader.onload = e => {
        const avatar = document.getElementById('js-avatar');
        avatar.style.backgroundImage = `url(${e.target.result})`;
        avatar.style.backgroundSize = 'cover';
        avatar.style.backgroundPosition = 'center';
        avatar.textContent = '';
      };
      reader.readAsDataURL(file);
      isDirty = true;
    }

    function saveProfile() {
      if (!isDirty) return;
      const btn = document.getElementById('js-save-btn');
      btn.textContent = 'Saved!';
      btn.disabled = true;
      setTimeout(() => {
        window.location.href = 'settings';
      }, 800);
    }

    // Warn before leaving with unsaved changes
    window.addEventListener('beforeunload', e => {
      if (isDirty) e.returnValue = 'You have unsaved changes.';
    });
  </script>

</body>
</html>
