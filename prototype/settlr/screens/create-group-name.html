<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Settlr — Create Group</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/index.css">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-body);
      background: var(--surface-primary);
      color: var(--text-primary);
      max-width: 393px;
      margin: 0 auto;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }


    /* ── Content ── */
    .content {
      flex: 1;
      padding: var(--spacing-24) var(--spacing-24);
      display: flex;
      flex-direction: column;
      gap: var(--spacing-32);
    }

    /* ── Group Photo Area ── */
    .photo-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--spacing-12);
    }
    .photo-upload {
      width: 96px;
      height: 96px;
      border-radius: var(--radius-24);
      background: var(--type-chip-bg-on);
      border: 2px dashed var(--toast-brand-border);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--spacing-4);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: all 0.15s ease;
    }
    .photo-upload:active {
      background: var(--btn-secondary-bg);
    }
    .photo-upload__icon {
      font-size: 28px;
      color: var(--card-create-fg);
    }
    .photo-upload__text {
      font-family: var(--font-body);
      font-size: 10px;
      font-weight: var(--weight-medium);
      color: var(--text-brand);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    /* ── Name Field ── */
    .field {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-4);
    }
    .field__label {
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: var(--weight-regular);
      line-height: 19px;
      color: var(--input-label);
    }
    .field__input {
      width: 100%;
      height: 48px;
      padding: 0 var(--spacing-16);
      border-radius: var(--radius-12);
      border: var(--border-medium) solid var(--input-border-default);
      background: var(--input-bg);
      font-family: var(--font-body);
      font-size: 16px;
      font-weight: var(--weight-medium);
      color: var(--input-fg-active);
      outline: none;
      transition: all 0.15s ease;
    }
    .field__input::placeholder {
      color: var(--input-fg-default);
      font-weight: var(--weight-regular);
    }
    .field__input:focus {
      background: var(--input-bg-focused);
      border-color: var(--input-border-focused);
    }
    .field__helper {
      font-family: var(--font-body);
      font-size: 11px;
      font-weight: var(--weight-regular);
      line-height: 17px;
      color: var(--input-helper);
    }

    /* ── Group Type Grid ── */
    .type-section {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-8);
    }
    .type-section__label {
      font-family: var(--font-body);
      font-size: 11px;
      font-weight: var(--weight-semibold);
      letter-spacing: 1.76px;
      text-transform: uppercase;
      color: var(--text-tertiary);
    }
    .type-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: var(--spacing-8);
    }
    .type-chip {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--spacing-4);
      padding: var(--spacing-12) var(--spacing-8);
      border-radius: var(--radius-12);
      border: var(--border-medium) solid var(--border-subtle);
      background: var(--surface-card);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: all 0.15s ease;
    }
    .type-chip:active {
      background: var(--btn-icon-bg);
    }
    .type-chip.is-selected {
      background: var(--container-bg-selected);
      border-color: var(--container-border-selected);
    }
    .type-chip__emoji {
      font-size: 24px;
      line-height: 1;
    }
    .type-chip__name {
      font-family: var(--font-body);
      font-size: 11px;
      font-weight: var(--weight-medium);
      color: var(--text-secondary);
      text-align: center;
    }
    .type-chip.is-selected .type-chip__name {
      color: var(--btn-secondary-fg);
      font-weight: var(--weight-semibold);
    }

    /* ── Description Field ── */
    .field__textarea {
      width: 100%;
      min-height: 80px;
      padding: var(--spacing-12) var(--spacing-16);
      border-radius: var(--radius-12);
      border: var(--border-medium) solid var(--input-border-default);
      background: var(--input-bg);
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: var(--weight-regular);
      line-height: 23px;
      color: var(--input-fg-active);
      outline: none;
      resize: none;
      transition: all 0.15s ease;
    }
    .field__textarea::placeholder {
      color: var(--input-fg-default);
    }
    .field__textarea:focus {
      background: var(--input-bg-focused);
      border-color: var(--input-border-focused);
    }

    /* ── Bottom CTA ── */
    .bottom-cta {
      padding: var(--spacing-12) var(--spacing-24) var(--spacing-32);
      flex-shrink: 0;
    }
    .btn-next {
      display: flex;
      width: 100%;
      height: 52px;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-full);
      border: none;
      cursor: pointer;
      font-family: var(--font-body);
      font-size: 16px;
      font-weight: var(--weight-semibold);
      background: var(--btn-primary-bg);
      color: var(--btn-primary-fg);
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-next:active { background: var(--btn-primary-bg-pressed); }
  </style>
</head>
<body>

  <!-- ── Status Bar ── -->
  <div class="status-bar">
    <span class="status-bar__time">9:41</span>
    <div class="status-bar__icons">
      <svg width="17" height="12" viewBox="0 0 17 12" fill="none"><rect x="0" y="4" width="3" height="8" rx="1" fill="currentColor"/><rect x="4.5" y="2.5" width="3" height="9.5" rx="1" fill="currentColor"/><rect x="9" y="1" width="3" height="11" rx="1" fill="currentColor"/><rect x="13.5" y="0" width="3" height="12" rx="1" fill="currentColor" opacity="0.35"/></svg>
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M8 9.5a1.25 1.25 0 1 0 0 2.5 1.25 1.25 0 0 0 0-2.5z" fill="currentColor"/><path d="M3.5 6.2C4.9 4.8 6.9 4 9 4s4.1.8 5.5 2.2l-1.5 1.5C11.9 6.6 10.5 6 9 6S6.1 6.6 5 7.7L3.5 6.2z" fill="currentColor"/><path d="M.5 3.2C2.4 1.2 5.6 0 9 0s6.6 1.2 8.5 3.2L16 4.7C14.5 3 11.9 2 9 2S3.5 3 2 4.7L.5 3.2z" fill="currentColor"/></svg>
      <svg width="25" height="12" viewBox="0 0 25 12" fill="none"><rect x="0.5" y="0.5" width="21" height="11" rx="3.5" stroke="currentColor" stroke-opacity="0.35"/><rect x="2" y="2" width="18" height="8" rx="2" fill="currentColor"/><path d="M23 4v4a2 2 0 0 0 0-4z" fill="currentColor" fill-opacity="0.4"/></svg>
    </div>
  </div>

  <!-- ── Top Bar ── -->
  <header class="top-app-bar top-app-bar--nav">
    <a href="home-dashboard" class="top-app-bar__back" aria-label="Back">
      <i class="ph-bold ph-caret-left"></i>
    </a>
    <span class="top-app-bar__title">New Group</span>
  </header>

  <!-- ── Step Progress ── -->
  <div class="step-progress">
    <div class="step-progress__step step-progress__step--active"></div>
    <div class="step-progress__step"></div>
    <div class="step-progress__step"></div>
  </div>

  <!-- ── Content ── -->
  <div class="content">

    <!-- Group Photo -->
    <div class="photo-area">
      <div class="photo-upload">
        <i class="ph ph-image photo-upload__icon"></i>
        <span class="photo-upload__text">Photo</span>
      </div>
    </div>

    <!-- Group Name -->
    <div class="field">
      <label class="field__label">Group name</label>
      <input type="text" class="field__input" placeholder="e.g. Goa Trip, Flat Expenses..." autofocus>
      <span class="field__helper">Give your group a memorable name</span>
    </div>

    <!-- Group Type -->
    <div class="type-section">
      <span class="type-section__label">Group Type</span>
      <div class="type-grid">
        <div class="type-chip is-selected" onclick="selectType(this)">
          <span class="type-chip__emoji">✈️</span>
          <span class="type-chip__name">Trip</span>
        </div>
        <div class="type-chip" onclick="selectType(this)">
          <span class="type-chip__emoji">🏠</span>
          <span class="type-chip__name">Home</span>
        </div>
        <div class="type-chip" onclick="selectType(this)">
          <span class="type-chip__emoji">🍕</span>
          <span class="type-chip__name">Food</span>
        </div>
        <div class="type-chip" onclick="selectType(this)">
          <span class="type-chip__emoji">💼</span>
          <span class="type-chip__name">Work</span>
        </div>
        <div class="type-chip" onclick="selectType(this)">
          <span class="type-chip__emoji">🎉</span>
          <span class="type-chip__name">Event</span>
        </div>
        <div class="type-chip" onclick="selectType(this)">
          <span class="type-chip__emoji">❤️</span>
          <span class="type-chip__name">Couple</span>
        </div>
        <div class="type-chip" onclick="selectType(this)">
          <span class="type-chip__emoji">⚽</span>
          <span class="type-chip__name">Sports</span>
        </div>
        <div class="type-chip" onclick="selectType(this)">
          <span class="type-chip__emoji">📝</span>
          <span class="type-chip__name">Other</span>
        </div>
      </div>
    </div>

    <!-- Description (optional) -->
    <div class="field">
      <label class="field__label">Description (optional)</label>
      <textarea class="field__textarea" placeholder="Add a short note about this group..."></textarea>
    </div>

  </div>

  <!-- ── Bottom CTA ── -->
  <div class="bottom-cta">
    <button id="js-next" class="btn-next">Next — Add Members</button>
  </div>

  <script>
    function selectType(el) {
      document.querySelectorAll('.type-chip').forEach(c => c.classList.remove('is-selected'));
      el.classList.add('is-selected');
    }

    document.getElementById('js-next').addEventListener('click', function() {
      var nameInput = document.querySelector('.field__input');
      var name = nameInput.value.trim();
      if (!name) { nameInput.focus(); nameInput.style.borderColor = 'var(--input-border-error)'; return; }
      var selectedChip = document.querySelector('.type-chip.is-selected');
      var type = selectedChip ? selectedChip.querySelector('.type-chip__name').textContent.trim().toLowerCase() : 'other';
      var emoji = selectedChip ? selectedChip.querySelector('.type-chip__emoji').textContent.trim() : '📝';
      sessionStorage.setItem('settlr_new_group', JSON.stringify({ name: name, type: type, emoji: emoji }));
      location.href = 'create-group-members';
    });
  </script>

</body>
</html>
