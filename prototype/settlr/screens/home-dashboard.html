<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Settlr — Home</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Design System Tokens -->
  <link rel="stylesheet" href="../tokens/index.css">
  <!-- Design System Component CSS -->
  <link rel="stylesheet" href="../css/index.css">
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>

  <style>
    /* ── Screen Shell ── */
    html, body {
      height: 100%;
      overflow: hidden;
    }
    body {
      display: flex;
      flex-direction: column;
      max-width: 393px;
      margin: 0 auto;
      overflow: hidden;
    }

    /* ── Status Bar ── */
    .status-bar {
      height: var(--spacing-48);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 var(--spacing-16);
      background: var(--surface-primary);
    }
    .status-bar__time {
      font-family: var(--font-body);
      font-size: var(--font-size-14);
      font-weight: var(--weight-semibold);
      line-height: var(--line-height-20);
      letter-spacing: -0.5px;
      color: var(--text-primary);
    }
    .status-bar__icons {
      display: flex;
      align-items: center;
      gap: var(--spacing-4);
      color: var(--text-primary);
    }

    /* ── Top Bar ── */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--spacing-8) var(--spacing-16);
      background: var(--surface-primary);
      flex-shrink: 0;
    }
    .top-bar__brand {
      font-family: var(--font-display);
      font-size: var(--font-size-32);
      font-weight: var(--weight-black);
      line-height: var(--line-height-36);
      letter-spacing: -1.28px;
      color: var(--text-brand);
      flex: 1;
    }
    .top-bar__actions {
      display: flex;
      align-items: center;
      gap: var(--spacing-8);
    }
    .top-bar__icon-btn {
      width: 40px;
      height: 40px;
      border-radius: var(--radius-full);
      background: var(--btn-icon-bg);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--btn-icon-fg);
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
      position: relative;
    }
    .top-bar__icon-btn:active { background: var(--btn-icon-bg-pressed); }
    .top-bar__icon-btn i { font-size: var(--icon-md); }
    .notif-badge {
      position: absolute;
      top: 6px;
      right: 6px;
      width: 8px;
      height: 8px;
      border-radius: var(--radius-full);
      background: var(--expense-owe-fg);
      border: 1.5px solid var(--surface-primary);
    }

    /* ── Hero / Balance Area ── */
    .hero {
      background: var(--btn-icon-bg);
      height: 200px;
      padding: var(--spacing-12) var(--spacing-16);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      gap: var(--spacing-16);
      flex-shrink: 0;
    }
    .hero__info {
      display: flex;
      flex-direction: column;
    }
    .hero__label {
      font-family: var(--font-body);
      font-size: var(--font-size-12);
      font-weight: var(--weight-regular);
      line-height: var(--line-height-19);
      color: var(--text-primary);
    }
    .hero__amount {
      font-family: var(--font-display);
      font-size: var(--font-size-32);
      font-weight: var(--weight-black);
      line-height: var(--line-height-36);
      letter-spacing: -1.28px;
      color: var(--heading-fg);
    }
    .hero__actions {
      display: flex;
      gap: var(--spacing-8);
    }

    /* ── Cards Row (horizontal scroll) ── */
    .cards-row {
      display: flex;
      gap: var(--spacing-12);
      padding: 0;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      scroll-padding-left: var(--spacing-16);
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    .cards-row::-webkit-scrollbar { display: none; }
    .cards-row::before,
    .cards-row::after {
      content: '';
      min-width: var(--spacing-16);
      flex-shrink: 0;
    }

    /* ── Group Card (screen-specific overrides) ── */
    .card-group {
      flex-shrink: 0;
      width: 150px;
      height: auto;
      scroll-snap-align: start;
      align-self: stretch;
    }
    .card-group__image {
      height: 120px;
    }
    .card-group__info {
      padding: var(--spacing-8);
      gap: var(--spacing-12);
    }
    .card-group__info .card-group__amount {
      margin-top: 0;
    }

    /* ── Create Card (extends .card-create) ── */
    .card-create {
      flex-shrink: 0;
      width: 150px;
      height: auto;
      scroll-snap-align: start;
      text-decoration: none;
      align-self: stretch;
    }

    /* ── Expense List ── */
    .expense-list { display: flex; flex-direction: column; }
    .expense-item__text { gap: var(--spacing-2); }

    /* ── Scrollable Content ── */
    .content {
      flex: 1;
      overflow-y: auto;
      padding-bottom: 112px;
      background: var(--surface-primary);
    }

    /* ── FAB icon size ── */
    .fab i { font-size: var(--font-size-24); }
  </style>
</head>
<body>

  <!-- ── Status Bar ── -->
  <div class="status-bar">
    <span class="status-bar__time">9:41</span>
    <div class="status-bar__icons">
      <!-- Signal -->
      <svg width="17" height="12" viewBox="0 0 17 12" fill="none">
        <rect x="0" y="4" width="3" height="8" rx="1" fill="currentColor"/>
        <rect x="4.5" y="2.5" width="3" height="9.5" rx="1" fill="currentColor"/>
        <rect x="9" y="1" width="3" height="11" rx="1" fill="currentColor"/>
        <rect x="13.5" y="0" width="3" height="12" rx="1" fill="currentColor" opacity="0.35"/>
      </svg>
      <!-- Wi-Fi -->
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
        <path d="M8 9.5a1.25 1.25 0 1 0 0 2.5 1.25 1.25 0 0 0 0-2.5z" fill="currentColor"/>
        <path d="M3.5 6.2C4.9 4.8 6.9 4 9 4s4.1.8 5.5 2.2l-1.5 1.5C11.9 6.6 10.5 6 9 6S6.1 6.6 5 7.7L3.5 6.2z" fill="currentColor"/>
        <path d="M.5 3.2C2.4 1.2 5.6 0 9 0s6.6 1.2 8.5 3.2L16 4.7C14.5 3 11.9 2 9 2S3.5 3 2 4.7L.5 3.2z" fill="currentColor"/>
      </svg>
      <!-- Battery -->
      <svg width="25" height="12" viewBox="0 0 25 12" fill="none">
        <rect x="0.5" y="0.5" width="21" height="11" rx="3.5" stroke="currentColor" stroke-opacity="0.35"/>
        <rect x="2" y="2" width="18" height="8" rx="2" fill="currentColor"/>
        <path d="M23 4v4a2 2 0 0 0 0-4z" fill="currentColor" fill-opacity="0.4"/>
      </svg>
    </div>
  </div>

  <!-- ── Top Bar: Brand + Actions + Avatar ── -->
  <header class="top-bar">
    <span class="top-bar__brand">Settlr</span>
    <div class="top-bar__actions">
      <a href="settings" class="avatar avatar--initials avatar--lg" id="js-user-initials" aria-label="Settings">DR</a>
    </div>
  </header>

  <!-- ── Scrollable Content ── -->
  <main class="content">

    <!-- Hero: Balance + Actions -->
    <section class="hero">
      <div class="hero__info">
        <span class="hero__label" id="js-hero-label">Overall you are owed</span>
        <span class="hero__amount" id="js-hero-amount">&#8377;12,300</span>
      </div>
      <div class="hero__actions">
        <a href="add-amount" class="btn btn--sm btn--primary">
          <span class="btn__content">
            <span class="btn__label">Add expense</span>
            <span class="btn__icon">
              <i class="ph-bold ph-plus"></i>
            </span>
          </span>
        </a>
        <a href="settle-select" class="btn btn--sm btn--secondary">
          <span class="btn__content">
            <span class="btn__label">Settle up</span>
            <span class="btn__icon">
              <i class="ph-bold ph-arrow-right"></i>
            </span>
          </span>
        </a>
      </div>
    </section>

    <!-- Recent Groups -->
    <div class="heading">
      <span class="heading__text">Recent groups</span>
      <a href="people?filter=group" class="btn btn--ghost btn--sm">
        <span class="btn__content">
          <span class="btn__label">View all</span>
          <span class="btn__icon">
            <i class="ph ph-caret-right"></i>
          </span>
        </span>
      </a>
    </div>

    <div class="cards-row" id="js-cards-row">
      <a href="create-group-name" class="card-create">
        <div class="card-create__icon">
          <i class="ph-bold ph-plus"></i>
        </div>
        <span class="card-create__text">Create new group</span>
      </a>
    </div>

    <!-- Activity -->
    <div class="heading mt-8">
      <span class="heading__text">Activity</span>
      <a href="activity" class="btn btn--ghost btn--sm">
        <span class="btn__content">
          <span class="btn__label">View all</span>
          <span class="btn__icon">
            <i class="ph ph-caret-right"></i>
          </span>
        </span>
      </a>
    </div>

    <div class="expense-list" id="js-activity-list"></div>

  </main>

  <!-- ── Fixed Bottom: Nav Pill + FAB ── -->
  <div class="bottom-nav-bar">
    <nav class="bottom-nav">
      <a href="home-dashboard" class="bottom-nav__tab is-active">
        <div class="bottom-nav__tab-content">
          <span class="bottom-nav__tab-icon"><i class="ph-fill ph-house"></i></span>
          <span class="bottom-nav__tab-label">Home</span>
        </div>
      </a>
      <a href="people" class="bottom-nav__tab">
        <div class="bottom-nav__tab-content">
          <span class="bottom-nav__tab-icon"><i class="ph ph-user"></i></span>
          <span class="bottom-nav__tab-label">People</span>
        </div>
      </a>
      <a href="activity" class="bottom-nav__tab">
        <div class="bottom-nav__tab-content">
          <span class="bottom-nav__tab-icon"><i class="ph ph-clock"></i></span>
          <span class="bottom-nav__tab-label">Activity</span>
        </div>
      </a>
    </nav>
    <a href="add-amount" class="fab" aria-label="Add expense">
      <i class="ph-bold ph-plus"></i>
    </a>
  </div>

  <script src="../js/store.js"></script>
  <script src="../js/render.js"></script>
  <script>
    (function () {
      // User initials
      var user = Store.getCurrentUser();
      document.getElementById('js-user-initials').textContent = user.initials;

      // Hero balance
      var net = Store.getNetBalance();
      var labelEl  = document.getElementById('js-hero-label');
      var amountEl = document.getElementById('js-hero-amount');
      if (net.direction === 'lent') {
        labelEl.textContent  = 'Overall you are owed';
        amountEl.textContent = Store.formatINR(net.amount);
      } else if (net.direction === 'owe') {
        labelEl.textContent  = 'Overall you owe';
        amountEl.textContent = Store.formatINR(net.amount);
      } else {
        labelEl.textContent  = 'All settled up';
        amountEl.textContent = '₹0';
      }

      // Group cards (prepend before the create card)
      var cardsRow = document.getElementById('js-cards-row');
      var createCard = cardsRow.querySelector('.card-create');
      Store.getGroups().forEach(function (g) {
        var bal  = Store.getGroupBalance(g.id);
        var html = Render.groupCard(g, bal);
        var tmp  = document.createElement('div');
        tmp.innerHTML = html;
        cardsRow.insertBefore(tmp.firstChild, createCard);
      });

      // Activity list (first 8 items, flat — no date sections)
      var feed = Store.getActivityFeed(8);
      document.getElementById('js-activity-list').innerHTML = feed
        .map(function (e) { return Render.expenseItem(e, e.net, e.contextLabel); })
        .join('');
    }());
  </script>

</body>
</html>
