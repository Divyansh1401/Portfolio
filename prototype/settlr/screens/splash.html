<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Settlr — Splash</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../tokens/index.css">
  <link rel="stylesheet" href="../css/index.css">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-body);
      background: var(--btn-primary-bg);
      color: var(--btn-primary-fg);
      max-width: 393px;
      margin: 0 auto;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* ── Status Bar ── */
    .status-bar {
      height: 44px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 var(--spacing-16);
    }
    .status-bar__time {
      font-family: var(--font-body);
      font-size: var(--font-size-14);
      font-weight: var(--weight-semibold);
      line-height: var(--line-height-20);
      letter-spacing: -0.5px;
      color: var(--btn-primary-fg);
    }
    .status-bar__icons {
      display: flex;
      align-items: center;
      gap: var(--spacing-4);
      color: var(--btn-primary-fg);
    }

    /* ── Splash Content ── */
    .splash {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--spacing-12);
      position: relative;
    }

    /* ── Decorative Background Pattern ── */
    .splash::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 20% 30%, var(--text-brand) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, var(--text-brand) 0%, transparent 50%),
        radial-gradient(circle at 50% 50%, var(--btn-primary-bg-pressed) 0%, transparent 80%);
      opacity: var(--opacity-medium);
      pointer-events: none;
    }

    /* ── Logo Icon ── */
    .splash__icon {
      width: 80px;
      height: 80px;
      border-radius: var(--radius-24);
      background: var(--surface-card);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: logoIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s both;
      position: relative;
      z-index: 1;
    }
    .splash__icon i {
      font-size: 40px;
      color: var(--btn-primary-bg);
    }

    /* ── Brand Name ── */
    .splash__name {
      font-family: var(--font-display);
      font-size: var(--font-size-40);
      font-weight: var(--weight-black);
      line-height: var(--line-height-44);
      letter-spacing: -1.60px;
      color: var(--btn-primary-fg);
      animation: fadeUp 0.5s ease 0.5s both;
      position: relative;
      z-index: 1;
    }

    /* ── Tagline ── */
    .splash__tagline {
      font-family: var(--font-body);
      font-size: var(--font-size-16);
      font-weight: var(--weight-regular);
      line-height: var(--line-height-27);
      color: var(--btn-secondary-bg);
      animation: fadeUp 0.5s ease 0.7s both;
      position: relative;
      z-index: 1;
    }

    /* ── Bottom ── */
    .splash__bottom {
      padding: var(--spacing-16) var(--spacing-16) var(--spacing-48);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--spacing-16);
      animation: fadeUp 0.5s ease 0.9s both;
      position: relative;
      z-index: 1;
    }

    .btn-start {
      display: flex;
      width: 100%;
      height: 52px;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-full);
      border: none;
      cursor: pointer;
      font-family: var(--font-body);
      font-size: var(--font-size-16);
      font-weight: var(--weight-semibold);
      background: var(--surface-card);
      color: var(--btn-primary-bg-pressed);
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-start:active {
      background: var(--btn-icon-bg);
    }

    .splash__footer {
      font-family: var(--font-body);
      font-size: var(--font-size-12);
      font-weight: var(--weight-regular);
      line-height: var(--line-height-19);
      color: var(--btn-secondary-bg);
      text-align: center;
    }

    /* ── Floating Shapes (decorative) ── */
    .shapes {
      position: fixed;
      inset: 0;
      max-width: 393px;
      margin: 0 auto;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }
    .shape {
      position: absolute;
      border-radius: var(--radius-full);
      opacity: 0.12;
      animation: float 6s ease-in-out infinite alternate;
    }
    .shape--1 {
      width: 120px; height: 120px;
      background: var(--fab-bg);
      top: 10%; left: -30px;
      animation-delay: 0s;
    }
    .shape--2 {
      width: 80px; height: 80px;
      background: var(--btn-secondary-bg);
      top: 25%; right: -20px;
      animation-delay: 1s;
    }
    .shape--3 {
      width: 160px; height: 160px;
      background: var(--text-brand);
      bottom: 20%; left: 50%;
      transform: translateX(-50%);
      animation-delay: 2s;
    }
    .shape--4 {
      width: 60px; height: 60px;
      background: var(--btn-secondary-bg);
      bottom: 30%; left: 20px;
      animation-delay: 0.5s;
    }

    @keyframes float {
      from { transform: translateY(0px); }
      to { transform: translateY(-20px); }
    }
    @keyframes logoIn {
      from { transform: scale(0) rotate(-15deg); opacity: 0; }
      to { transform: scale(1) rotate(0deg); opacity: 1; }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <!-- ── Status Bar ── -->
  <div class="status-bar">
    <span class="status-bar__time">9:41</span>
    <div class="status-bar__icons">
      <svg width="17" height="12" viewBox="0 0 17 12" fill="none"><rect x="0" y="4" width="3" height="8" rx="1" fill="currentColor"/><rect x="4.5" y="2.5" width="3" height="9.5" rx="1" fill="currentColor"/><rect x="9" y="1" width="3" height="11" rx="1" fill="currentColor"/><rect x="13.5" y="0" width="3" height="12" rx="1" fill="currentColor" opacity="0.35"/></svg>
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M8 9.5a1.25 1.25 0 1 0 0 2.5 1.25 1.25 0 0 0 0-2.5z" fill="currentColor"/><path d="M3.5 6.2C4.9 4.8 6.9 4 9 4s4.1.8 5.5 2.2l-1.5 1.5C11.9 6.6 10.5 6 9 6S6.1 6.6 5 7.7L3.5 6.2z" fill="currentColor"/><path d="M.5 3.2C2.4 1.2 5.6 0 9 0s6.6 1.2 8.5 3.2L16 4.7C14.5 3 11.9 2 9 2S3.5 3 2 4.7L.5 3.2z" fill="currentColor"/></svg>
      <svg width="25" height="12" viewBox="0 0 25 12" fill="none"><rect x="0.5" y="0.5" width="21" height="11" rx="3.5" stroke="currentColor" stroke-opacity="0.35"/><rect x="2" y="2" width="18" height="8" rx="2" fill="currentColor"/><path d="M23 4v4a2 2 0 0 0 0-4z" fill="currentColor" fill-opacity="0.4"/></svg>
    </div>
  </div>

  <!-- ── Floating Shapes ── -->
  <div class="shapes">
    <div class="shape shape--1"></div>
    <div class="shape shape--2"></div>
    <div class="shape shape--3"></div>
    <div class="shape shape--4"></div>
  </div>

  <!-- ── Splash Content ── -->
  <div class="splash">
    <div class="splash__icon">
      <i class="ph ph-chart-line-up"></i>
    </div>
    <h1 class="splash__name">Settlr</h1>
    <p class="splash__tagline">Split expenses. Settle easy.</p>
  </div>

  <!-- ── Bottom ── -->
  <div class="splash__bottom">
    <a href="login" class="btn-start">Get Started</a>
    <p class="splash__footer">By continuing, you agree to our Terms &amp; Privacy Policy</p>
  </div>

</body>
</html>
