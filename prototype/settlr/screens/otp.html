<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Settlr — Verify OTP</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../tokens/index.css">
  <link rel="stylesheet" href="../css/index.css">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-body);
      background: var(--surface-primary);
      color: var(--text-primary);
      max-width: 393px;
      margin: 0 auto;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Status Bar ── */
    .status-bar {
      height: 44px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 var(--spacing-16);
    }
    .status-bar__time {
      font-family: var(--font-body);
      font-size: var(--font-size-14);
      font-weight: var(--weight-semibold);
      line-height: var(--line-height-20);
      letter-spacing: -0.5px;
      color: var(--text-primary);
    }
    .status-bar__icons {
      display: flex;
      align-items: center;
      gap: var(--spacing-4);
      color: var(--text-primary);
    }


    /* ── Hero ── */
    .otp-hero {
      padding: var(--spacing-32) var(--spacing-24) var(--spacing-16);
      display: flex;
      flex-direction: column;
      gap: var(--spacing-12);
    }
    .otp-hero__title {
      font-family: var(--font-display);
      font-size: var(--font-size-28);
      font-weight: var(--weight-black);
      line-height: var(--line-height-34);
      letter-spacing: -0.84px;
      color: var(--top-app-bar-title);
    }
    .otp-hero__subtitle {
      font-family: var(--font-body);
      font-size: var(--font-size-16);
      font-weight: var(--weight-regular);
      line-height: var(--line-height-27);
      color: var(--text-secondary);
    }
    .otp-hero__phone {
      font-weight: var(--weight-semibold);
      color: var(--text-primary);
    }
    .otp-hero__edit {
      font-family: var(--font-body);
      font-size: var(--font-size-14);
      font-weight: var(--weight-semibold);
      color: var(--text-brand);
      text-decoration: none;
      margin-left: var(--spacing-8);
    }

    /* ── OTP Section ── */
    .otp-section {
      flex: 1;
      padding: var(--spacing-24);
      display: flex;
      flex-direction: column;
      gap: var(--spacing-24);
    }

    /* ── Resend Row ── */
    .resend-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .resend-timer {
      font-family: var(--font-body);
      font-size: var(--font-size-14);
      font-weight: var(--weight-regular);
      color: var(--text-tertiary);
    }
    .resend-timer__count {
      font-weight: var(--weight-semibold);
      color: var(--text-secondary);
      font-variant-numeric: tabular-nums;
    }
    .resend-btn {
      border: none;
      background: transparent;
      cursor: pointer;
      font-family: var(--font-body);
      font-size: var(--font-size-14);
      font-weight: var(--weight-semibold);
      color: var(--text-brand);
      padding: 0;
      -webkit-tap-highlight-color: transparent;
      opacity: var(--opacity-strong);
      pointer-events: none;
    }
    .resend-btn.is-active {
      opacity: 1;
      pointer-events: auto;
    }

    /* ── Security Note ── */
    .security-note {
      display: flex;
      align-items: flex-start;
      gap: var(--spacing-8);
      padding: var(--spacing-12) var(--spacing-16);
      border-radius: var(--radius-12);
      background: var(--btn-icon-bg);
    }
    .security-note__icon {
      font-size: var(--icon-sm);
      color: var(--text-brand);
      flex-shrink: 0;
      margin-top: var(--spacing-2);
    }
    .security-note__text {
      font-family: var(--font-body);
      font-size: var(--font-size-12);
      font-weight: var(--weight-regular);
      line-height: var(--line-height-19);
      color: var(--top-app-bar-title);
    }

    /* ── Bottom CTA ── */
    .bottom-cta {
      padding: var(--spacing-12) var(--spacing-24) var(--spacing-32);
      flex-shrink: 0;
    }
  </style>
</head>
<body>

  <!-- ── Status Bar ── -->
  <div class="status-bar">
    <span class="status-bar__time">9:41</span>
    <div class="status-bar__icons">
      <svg width="17" height="12" viewBox="0 0 17 12" fill="none"><rect x="0" y="4" width="3" height="8" rx="1" fill="currentColor"/><rect x="4.5" y="2.5" width="3" height="9.5" rx="1" fill="currentColor"/><rect x="9" y="1" width="3" height="11" rx="1" fill="currentColor"/><rect x="13.5" y="0" width="3" height="12" rx="1" fill="currentColor" opacity="0.35"/></svg>
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M8 9.5a1.25 1.25 0 1 0 0 2.5 1.25 1.25 0 0 0 0-2.5z" fill="currentColor"/><path d="M3.5 6.2C4.9 4.8 6.9 4 9 4s4.1.8 5.5 2.2l-1.5 1.5C11.9 6.6 10.5 6 9 6S6.1 6.6 5 7.7L3.5 6.2z" fill="currentColor"/><path d="M.5 3.2C2.4 1.2 5.6 0 9 0s6.6 1.2 8.5 3.2L16 4.7C14.5 3 11.9 2 9 2S3.5 3 2 4.7L.5 3.2z" fill="currentColor"/></svg>
      <svg width="25" height="12" viewBox="0 0 25 12" fill="none"><rect x="0.5" y="0.5" width="21" height="11" rx="3.5" stroke="currentColor" stroke-opacity="0.35"/><rect x="2" y="2" width="18" height="8" rx="2" fill="currentColor"/><path d="M23 4v4a2 2 0 0 0 0-4z" fill="currentColor" fill-opacity="0.4"/></svg>
    </div>
  </div>

  <!-- ── Top Bar ── -->
  <header class="top-app-bar top-app-bar--nav">
    <a href="login" class="top-app-bar__back" aria-label="Back">
      <i class="ph-bold ph-caret-left"></i>
    </a>
  </header>

  <!-- ── Hero ── -->
  <div class="otp-hero">
    <h1 class="otp-hero__title">Enter the code</h1>
    <p class="otp-hero__subtitle">
      We sent a 6-digit verification code to
      <span class="otp-hero__phone">+91 98765 43210</span>
      <a href="login" class="otp-hero__edit">Edit</a>
    </p>
  </div>

  <!-- ── OTP Input ── -->
  <div class="otp-section">

    <div class="otp-group">
      <label class="otp-group__label">Verification code</label>
      <div class="otp-group__digits">
        <input class="otp-digit" type="tel" maxlength="1" inputmode="numeric" autocomplete="one-time-code" placeholder="·">
        <input class="otp-digit" type="tel" maxlength="1" inputmode="numeric" placeholder="·">
        <input class="otp-digit" type="tel" maxlength="1" inputmode="numeric" placeholder="·">
        <input class="otp-digit" type="tel" maxlength="1" inputmode="numeric" placeholder="·">
        <input class="otp-digit" type="tel" maxlength="1" inputmode="numeric" placeholder="·">
        <input class="otp-digit" type="tel" maxlength="1" inputmode="numeric" placeholder="·">
      </div>
      <p class="input-field__helper input-field__helper--error" id="otp-error" style="display:none;">Incorrect code. Please try again.</p>
      <span class="otp-group__helper">Enter the code from your SMS</span>
    </div>

    <!-- Resend -->
    <div class="resend-row">
      <span class="resend-timer">Resend in <span class="resend-timer__count">0:28</span></span>
      <button class="resend-btn">Resend Code</button>
    </div>

    <!-- Security Note -->
    <div class="security-note">
      <i class="ph ph-check security-note__icon"></i>
      <span class="security-note__text">We'll never share your phone number. Your data is encrypted and secure.</span>
    </div>
  </div>

  <!-- ── Bottom CTA ── -->
  <div class="bottom-cta">
    <a href="welcome" class="btn btn--primary btn--lg btn--full">Verify &amp; Continue</a>
  </div>

  <!-- ── OTP Auto-advance Script ── -->
  <script>
    const digits = document.querySelectorAll('.otp-digit');

    digits.forEach((input, idx) => {
      input.addEventListener('input', (e) => {
        const val = e.target.value;
        if (val && idx < digits.length - 1) {
          digits[idx + 1].focus();
        }
        // Add filled style
        if (val) {
          input.classList.add('otp-digit--filled');
        } else {
          input.classList.remove('otp-digit--filled');
        }
      });

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !e.target.value && idx > 0) {
          digits[idx - 1].focus();
          digits[idx - 1].classList.remove('otp-digit--filled');
        }
      });

      // Select all text on focus for easy replacement
      input.addEventListener('focus', () => {
        input.select();
      });
    });

    // Countdown timer
    let seconds = 28;
    const timerEl = document.querySelector('.resend-timer__count');
    const resendBtn = document.querySelector('.resend-btn');

    const countdown = setInterval(() => {
      seconds--;
      timerEl.textContent = `0:${seconds.toString().padStart(2, '0')}`;
      if (seconds <= 0) {
        clearInterval(countdown);
        timerEl.parentElement.style.display = 'none';
        resendBtn.classList.add('is-active');
      }
    }, 1000);
  </script>

</body>
</html>
