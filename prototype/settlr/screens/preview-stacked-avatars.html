<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stacked Avatars — Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Unbounded:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-neutral-50:  #FEF9EE;
      --color-neutral-100: #F9F1DA;
      --color-neutral-200: #EFE4C4;
      --color-neutral-300: #E0D0B0;
      --color-neutral-400: #BEB48A;
      --color-neutral-500: #9A9070;
      --color-neutral-600: #756C55;
      --color-neutral-900: #1A1810;
      --color-gray-0:    #FFFFFF;
      --color-gray-100:  #ECEFF1;
      --color-gray-200:  #D8DCE3;
      --color-olive-200: #BFCB9A;
      --color-olive-600: #31401A;

      --spacing-4:  4px;
      --spacing-8:  8px;
      --spacing-12: 12px;
      --spacing-16: 16px;
      --spacing-24: 24px;
      --spacing-32: 32px;

      --radius-full: 9999px;
      --font-body: 'Plus Jakarta Sans', sans-serif;
      --weight-regular:  400;
      --weight-medium:   500;
      --weight-semibold: 600;
      --weight-bold:     700;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--color-neutral-50);
      font-family: var(--font-body);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--spacing-32);
      padding: var(--spacing-32) var(--spacing-16);
    }

    .section-label {
      font-size: 11px;
      font-weight: var(--weight-semibold);
      letter-spacing: 1.76px;
      text-transform: uppercase;
      color: var(--color-neutral-400);
      width: 393px;
      margin-bottom: var(--spacing-8);
    }

    .phone {
      width: 393px;
      background: var(--color-gray-0);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(14,6,24,0.14), 0 4px 8px rgba(14,6,24,0.08);
      padding: var(--spacing-24) var(--spacing-16);
      display: flex;
      flex-direction: column;
      gap: var(--spacing-24);
    }

    .row-label {
      font-size: 11px;
      font-weight: var(--weight-semibold);
      letter-spacing: 1.6px;
      text-transform: uppercase;
      color: var(--color-neutral-400);
      margin-bottom: var(--spacing-8);
    }

    /* ── STACKED AVATARS ──────────────────────── */
    .avatar-stack {
      display: flex;
      align-items: center;
    }

    /* Each avatar in the stack */
    .avatar-stack__item {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      border-radius: var(--radius-full);
      font-family: var(--font-body);
      font-weight: var(--weight-semibold);
      background: var(--color-olive-200);
      color: var(--color-olive-600);
      border: 2px solid var(--color-gray-0);
    }

    /* Overlap: each item after first pulls left */
    .avatar-stack__item + .avatar-stack__item {
      margin-left: -6px;
    }

    /* Overflow count bubble — same size as siblings */
    .avatar-stack__overflow {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      border-radius: var(--radius-full);
      font-family: var(--font-body);
      font-weight: var(--weight-semibold);
      background: var(--color-gray-100);
      color: var(--color-neutral-600);
      border: 2px solid var(--color-gray-0);
      margin-left: -6px;
    }

    /* ── SIZES ────────────────────────────────── */
    .avatar-stack--xs .avatar-stack__item,
    .avatar-stack--xs .avatar-stack__overflow {
      width: 20px; height: 20px; font-size: 7px;
    }
    .avatar-stack--xs .avatar-stack__item + .avatar-stack__item,
    .avatar-stack--xs .avatar-stack__overflow { margin-left: -5px; }

    .avatar-stack--sm .avatar-stack__item,
    .avatar-stack--sm .avatar-stack__overflow {
      width: 28px; height: 28px; font-size: 10px;
    }
    .avatar-stack--sm .avatar-stack__item + .avatar-stack__item,
    .avatar-stack--sm .avatar-stack__overflow { margin-left: -8px; }

    .avatar-stack--md .avatar-stack__item,
    .avatar-stack--md .avatar-stack__overflow {
      width: 40px; height: 40px; font-size: 14px;
    }
    .avatar-stack--md .avatar-stack__item + .avatar-stack__item,
    .avatar-stack--md .avatar-stack__overflow { margin-left: -12px; }

    /* ── WITH LABEL ───────────────────────────── */
    .avatar-stack-group {
      display: flex;
      align-items: center;
      gap: var(--spacing-8);
    }

    .avatar-stack-group__label {
      font-size: 13px;
      font-weight: var(--weight-medium);
      color: var(--color-neutral-500);
    }
  </style>
</head>
<body>

  <p class="section-label">Stacked Avatars</p>
  <div class="phone">

    <!-- XS — used in group detail header -->
    <div>
      <p class="row-label">XS — Group header</p>
      <div class="avatar-stack-group">
        <div class="avatar-stack avatar-stack--xs">
          <div class="avatar-stack__item">RK</div>
          <div class="avatar-stack__item">PS</div>
          <div class="avatar-stack__item">AJ</div>
          <div class="avatar-stack__item">NK</div>
        </div>
        <span class="avatar-stack-group__label">4 members</span>
      </div>
    </div>

    <!-- XS with overflow -->
    <div>
      <p class="row-label">XS — With overflow count</p>
      <div class="avatar-stack-group">
        <div class="avatar-stack avatar-stack--xs">
          <div class="avatar-stack__item">RK</div>
          <div class="avatar-stack__item">PS</div>
          <div class="avatar-stack__item">AJ</div>
          <div class="avatar-stack__overflow">+5</div>
        </div>
        <span class="avatar-stack-group__label">8 members</span>
      </div>
    </div>

    <!-- SM -->
    <div>
      <p class="row-label">SM</p>
      <div class="avatar-stack-group">
        <div class="avatar-stack avatar-stack--sm">
          <div class="avatar-stack__item">DK</div>
          <div class="avatar-stack__item">SR</div>
          <div class="avatar-stack__item">MV</div>
        </div>
        <span class="avatar-stack-group__label">3 members</span>
      </div>
    </div>

    <!-- SM with overflow -->
    <div>
      <p class="row-label">SM — With overflow</p>
      <div class="avatar-stack-group">
        <div class="avatar-stack avatar-stack--sm">
          <div class="avatar-stack__item">DK</div>
          <div class="avatar-stack__item">SR</div>
          <div class="avatar-stack__item">MV</div>
          <div class="avatar-stack__overflow">+9</div>
        </div>
        <span class="avatar-stack-group__label">12 members</span>
      </div>
    </div>

    <!-- MD -->
    <div>
      <p class="row-label">MD</p>
      <div class="avatar-stack avatar-stack--md">
        <div class="avatar-stack__item">RK</div>
        <div class="avatar-stack__item">PS</div>
        <div class="avatar-stack__item">AJ</div>
        <div class="avatar-stack__overflow">+4</div>
      </div>
    </div>

  </div>

</body>
</html>
