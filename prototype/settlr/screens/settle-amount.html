<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Settlr — Settle Amount</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/index.css">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-body);
      background: var(--surface-primary);
      color: var(--text-primary);
      max-width: 393px;
      margin: 0 auto;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }


    /* ── Person Preview ── */
    .person-preview {
      display: flex;
      align-items: center;
      gap: var(--spacing-12);
      padding: var(--spacing-12) var(--spacing-16);
      margin: 0 var(--spacing-16);
      border-radius: var(--radius-12);
      background: var(--surface-card);
      border: var(--border-small) solid var(--border-subtle);
    }
    .person-preview__avatar {
      width: 40px;
      height: 40px;
      border-radius: var(--radius-full);
      background: var(--contact-avatar-bg);
      color: var(--contact-avatar-fg);
      font-family: var(--font-body);
      font-size: var(--font-size-14);
      font-weight: var(--weight-semibold);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .person-preview__text { flex: 1; }
    .person-preview__name {
      font-family: var(--font-body);
      font-size: var(--font-size-14);
      font-weight: var(--weight-semibold);
      color: var(--text-primary);
    }
    .person-preview__balance {
      font-family: var(--font-body);
      font-size: var(--font-size-12);
      color: var(--expense-owe-fg);
    }

    /* ── Amount Area ── */
    .amount-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--spacing-8);
      padding: var(--spacing-24) var(--spacing-16);
    }
    .currency-badge {
      display: inline-flex;
      align-items: center;
      gap: var(--spacing-4);
      padding: 4px 10px;
      border-radius: var(--radius-full);
      background: var(--btn-icon-bg);
      font-family: var(--font-body);
      font-size: var(--font-size-12);
      font-weight: var(--weight-medium);
      color: var(--text-secondary);
    }
    .amount-display {
      font-family: var(--font-display);
      font-size: 48px;
      font-weight: var(--weight-black);
      letter-spacing: -1.92px;
      line-height: 52px;
      color: var(--text-primary);
      text-align: center;
      width: 100%;
    }
    .amount-display .cursor {
      display: inline-block;
      width: 2px;
      height: 44px;
      background: var(--text-brand);
      animation: blink 1s step-end infinite;
      vertical-align: middle;
      margin-left: 2px;
    }
    @keyframes blink { 50% { opacity: 0; } }

    .full-amount-chip {
      display: inline-flex;
      align-items: center;
      gap: var(--spacing-4);
      padding: 6px 14px;
      border-radius: var(--radius-full);
      background: var(--type-chip-bg-on);
      color: var(--btn-secondary-fg);
      font-family: var(--font-body);
      font-size: var(--font-size-12);
      font-weight: var(--weight-semibold);
      border: none;
      cursor: pointer;
      margin-top: var(--spacing-8);
      -webkit-tap-highlight-color: transparent;
    }
    .full-amount-chip:active { background: var(--btn-secondary-bg); }

    /* ── Numpad ── */
    .numpad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: var(--border-subtle);
      border-top: var(--border-small) solid var(--border-subtle);
      flex-shrink: 0;
    }
    .numpad__key {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 56px;
      background: var(--surface-card);
      border: none;
      cursor: pointer;
      font-family: var(--font-body);
      font-size: var(--font-size-20);
      font-weight: var(--weight-semibold);
      color: var(--text-primary);
      transition: background 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .numpad__key:active { background: var(--btn-icon-bg); }
    .numpad__key--action { color: var(--text-brand); }
    .numpad__key i { font-size: var(--font-size-24); }

    /* ── Bottom CTA ── */
    .bottom-cta {
      padding: var(--spacing-12) var(--spacing-16) var(--spacing-24);
      background: var(--surface-card);
      flex-shrink: 0;
    }
    .bottom-cta .btn {
      display: flex;
      width: 100%;
      height: 52px;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-full);
      border: none;
      cursor: pointer;
      font-family: var(--font-body);
      font-size: 16px;
      font-weight: var(--weight-semibold);
      background: var(--btn-primary-bg);
      color: var(--btn-primary-fg);
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
    }
    .bottom-cta .btn:active { background: var(--btn-primary-bg-pressed); }
  </style>
</head>
<body>

  <!-- ── Status Bar ── -->
  <div class="status-bar">
    <span class="status-bar__time">9:41</span>
    <div class="status-bar__icons">
      <svg width="17" height="12" viewBox="0 0 17 12" fill="none"><rect x="0" y="4" width="3" height="8" rx="1" fill="currentColor"/><rect x="4.5" y="2.5" width="3" height="9.5" rx="1" fill="currentColor"/><rect x="9" y="1" width="3" height="11" rx="1" fill="currentColor"/><rect x="13.5" y="0" width="3" height="12" rx="1" fill="currentColor" opacity="0.35"/></svg>
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M8 9.5a1.25 1.25 0 1 0 0 2.5 1.25 1.25 0 0 0 0-2.5z" fill="currentColor"/><path d="M3.5 6.2C4.9 4.8 6.9 4 9 4s4.1.8 5.5 2.2l-1.5 1.5C11.9 6.6 10.5 6 9 6S6.1 6.6 5 7.7L3.5 6.2z" fill="currentColor"/><path d="M.5 3.2C2.4 1.2 5.6 0 9 0s6.6 1.2 8.5 3.2L16 4.7C14.5 3 11.9 2 9 2S3.5 3 2 4.7L.5 3.2z" fill="currentColor"/></svg>
      <svg width="25" height="12" viewBox="0 0 25 12" fill="none"><rect x="0.5" y="0.5" width="21" height="11" rx="3.5" stroke="currentColor" stroke-opacity="0.35"/><rect x="2" y="2" width="18" height="8" rx="2" fill="currentColor"/><path d="M23 4v4a2 2 0 0 0 0-4z" fill="currentColor" fill-opacity="0.4"/></svg>
    </div>
  </div>

  <!-- ── Top Bar ── -->
  <header class="top-app-bar top-app-bar--nav">
    <a href="settle-select" class="top-app-bar__back" aria-label="Back">
      <i class="ph-bold ph-caret-left"></i>
    </a>
    <span class="top-app-bar__title">Settle Up</span>
  </header>

  <!-- ── Step Progress ── -->
  <div class="step-progress">
    <div class="step-progress__step step-progress__step--active"></div>
    <div class="step-progress__step step-progress__step--active"></div>
    <div class="step-progress__step"></div>
  </div>

  <!-- ── Person Preview ── -->
  <div class="person-preview">
    <div class="person-preview__avatar">JW</div>
    <div class="person-preview__text">
      <div class="person-preview__name">Johnnie Walker</div>
      <div class="person-preview__balance">You owe ₹1,220</div>
    </div>
  </div>

  <!-- ── Amount Display ── -->
  <div class="amount-area">
    <span class="currency-badge">₹ INR</span>
    <div class="amount-display">₹1,220<span class="cursor"></span></div>
    <button class="full-amount-chip">✓ Full amount</button>
  </div>

  <!-- ── Numpad ── -->
  <div class="numpad">
    <button class="numpad__key">1</button>
    <button class="numpad__key">2</button>
    <button class="numpad__key">3</button>
    <button class="numpad__key">4</button>
    <button class="numpad__key">5</button>
    <button class="numpad__key">6</button>
    <button class="numpad__key">7</button>
    <button class="numpad__key">8</button>
    <button class="numpad__key">9</button>
    <button class="numpad__key numpad__key--action">.</button>
    <button class="numpad__key">0</button>
    <button class="numpad__key numpad__key--action">
      <i class="ph ph-backspace"></i>
    </button>
  </div>

  <!-- ── Bottom CTA ── -->
  <div class="bottom-cta">
    <button class="btn" id="js-continue">Continue</button>
  </div>

  <script src="../js/store.js"></script>
  <script>
    (function () {
      var params = new URLSearchParams(location.search);
      var contactId = params.get('contactId');
      var contact = contactId ? Store.getContact(contactId) : null;
      var bal = contactId ? Store.getContactBalance(contactId) : { amount: 0, direction: 'settled' };

      // Populate person preview
      if (contact) {
        document.querySelector('.person-preview__avatar').textContent = contact.initials;
        document.querySelector('.person-preview__name').textContent = contact.name;
        var balText = bal.direction === 'owe'
          ? 'You owe ' + Store.formatINR(bal.amount)
          : bal.direction === 'lent'
            ? 'Owes you ' + Store.formatINR(bal.amount)
            : 'All settled';
        document.querySelector('.person-preview__balance').textContent = balText;
        document.querySelector('.person-preview__balance').style.color =
          bal.direction === 'owe' ? 'var(--expense-owe-fg)' : 'var(--expense-lent-fg)';
      }

      // Numpad logic
      var raw = '';
      var display = document.querySelector('.amount-display');

      function updateDisplay() {
        var shown = raw || '0';
        display.innerHTML = '&#8377;' + shown + '<span class="cursor"></span>';
      }
      updateDisplay();

      // Pre-fill full amount
      document.querySelector('.full-amount-chip').addEventListener('click', function() {
        raw = String(Math.round(bal.amount));
        updateDisplay();
      });

      document.querySelectorAll('.numpad__key').forEach(function(btn) {
        btn.addEventListener('click', function() {
          var val = btn.textContent.trim();
          if (btn.querySelector('i')) {
            // backspace
            raw = raw.slice(0, -1);
          } else if (val === '.') {
            if (!raw.includes('.')) raw += (raw ? '.' : '0.');
          } else {
            if (raw === '0') raw = val;
            else raw += val;
          }
          updateDisplay();
        });
      });

      document.getElementById('js-continue').addEventListener('click', function() {
        var amt = parseFloat(raw);
        if (!amt || amt <= 0) return;
        sessionStorage.setItem('settlr_settle', JSON.stringify({
          contactId: contactId,
          contactName: contact ? contact.name : '',
          contactInitials: contact ? contact.initials : '',
          direction: bal.direction,
          amount: amt
        }));
        location.href = 'settle-method';
      });
    }());
  </script>

</body>
</html>
